<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https: http:; connect-src 'self' https: http: blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: blob:; img-src 'self' data: blob: https: http:; media-src 'self' blob: data: https: http:;">
<title>MiMo 语音对话</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--accent:#6C5CE7;--accent2:#a29bfe;--danger:#ff6b6b;--ball:min(200px,42vw)}
  body{background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none}

  /* ── Orb ── */
  .orb-wrap{position:relative;width:var(--ball);height:var(--ball);display:flex;align-items:center;justify-content:center}
  .orb{width:100%;height:100%;border-radius:50%;background:#6C5CE7;box-shadow:0 0 60px rgba(108,92,231,.35);cursor:pointer;will-change:transform,border-radius,background;transition:background .3s}
  .orb:hover{transform:scale(1.04)}.orb:active{transform:scale(.97)}

  /* ── Deco rings ── */
  .ring{position:absolute;border-radius:50%;border:1.5px solid rgba(108,92,231,.2);pointer-events:none;opacity:0;transition:opacity .3s}
  .ring:nth-child(2){width:115%;height:115%}.ring:nth-child(3){width:130%;height:130%}.ring:nth-child(4){width:145%;height:145%}

  /* ═══ IDLE ═══ */
  .orb.idle{background:#6C5CE7;animation:orb-breathe 3s ease-in-out infinite}
  @keyframes orb-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  /* ═══ LOADING ═══ */
  .orb.loading{background:#a29bfe;animation:orb-pulse-load 1.5s ease-in-out infinite;cursor:default}
  @keyframes orb-pulse-load{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.7}}

  /* ═══ LISTENING ═══ */
  .orb.listen{background:#ff6348;box-shadow:0 0 60px rgba(255,99,72,.4)}
  .orb.listen{animation:orb-listen .9s ease-in-out infinite}
  @keyframes orb-listen{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  /* ═══ THINKING ═══ */
  .orb.think{background:#fdcb6e;box-shadow:0 0 60px rgba(253,203,110,.4);animation:orb-morph 1.6s ease-in-out infinite}
  @keyframes orb-morph{
    0%{border-radius:50%;transform:scale(1)}
    20%{border-radius:42% 58% 55% 45%/55% 42% 58% 45%;transform:scale(1.04)}
    40%{border-radius:55% 45% 42% 58%/45% 55% 42% 58%;transform:scale(1.02)}
    60%{border-radius:45% 55% 58% 42%/58% 45% 55% 42%;transform:scale(1.06)}
    80%{border-radius:58% 42% 45% 55%/42% 58% 45% 55%;transform:scale(1.03)}
    100%{border-radius:50%;transform:scale(1)}
  }

  /* ═══ SPEAKING ball ═══ */
  .orb.speak-ball{background:#6C5CE7;box-shadow:0 0 80px rgba(108,92,231,.5)}
  .orb.speak-ball~.ring{opacity:1;animation:sp-ring-pulse 1.8s ease-out infinite}
  .ring:nth-child(3){animation-delay:.5s}.ring:nth-child(4){animation-delay:1s}
  @keyframes sp-ring-pulse{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.15);opacity:0}}
  @keyframes ring-voice{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.2);opacity:0}}

  /* ═══ SPEAKING bars ═══ */
  .orb.speak-bars{opacity:0;pointer-events:none}
  .orb.speak-bars~.ring{opacity:0}

  #waveCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .3s}
  #waveCanvas.on{opacity:1}

  /* ── Status ── */
  .status{margin-top:32px;font-size:15px;color:rgba(255,255,255,.5);min-height:22px;transition:color .3s;text-align:center;padding:0 20px}
  .status.on{color:rgba(255,255,255,.85)}
  .hint{position:fixed;bottom:120px;font-size:13px;color:rgba(255,255,255,.3);animation:fade-pulse 3s ease-in-out infinite}
  @keyframes fade-pulse{0%,100%{opacity:.3}50%{opacity:.7}}

  /* ── Buttons ── */
  .ctrl{position:fixed;bottom:max(40px,env(safe-area-inset-bottom));left:0;right:0;display:flex;align-items:center;justify-content:center;gap:32px;z-index:10}
  .btn{width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);backdrop-filter:blur(10px);transition:all .25s}
  .btn:hover{background:rgba(255,255,255,.14);color:#fff}.btn:active{transform:scale(.92)}
  .btn svg{width:24px;height:24px;fill:currentColor}
  .btn.stop{background:rgba(255,107,107,.15);color:var(--danger)}.btn.stop:hover{background:rgba(255,107,107,.3)}
  .btn.hidden{display:none}
  .pause-wrap{position:fixed;bottom:max(40px,env(safe-area-inset-bottom));left:max(24px,env(safe-area-inset-left));z-index:10}

  /* ── Settings ── */
  .gear{position:fixed;top:max(16px,env(safe-area-inset-top));right:max(16px,env(safe-area-inset-right));z-index:20;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);transition:all .25s}
  .gear:hover{background:rgba(255,255,255,.12);color:#fff}
  .gear svg{width:22px;height:22px;fill:currentColor}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);z-index:100;display:none;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .panel{background:rgba(30,30,40,.95);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;width:min(440px,92vw);max-height:90vh;overflow-y:auto}
  .panel h2{font-size:20px;font-weight:600;margin-bottom:24px}
  .panel h3{font-size:15px;font-weight:600;margin:24px 0 12px;color:rgba(255,255,255,.6)}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:6px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:14px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:60px}
  .field .hint{font-size:11px;color:rgba(255,255,255,.3);margin-top:4px}
  .sactions{display:flex;gap:12px;margin-top:24px}
  .sactions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  .bsave{background:var(--accent);color:#fff}.bsave:hover{background:#5a4bd1}
  .bcancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}

  /* Chat log */
  .log{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .log::-webkit-scrollbar{width:4px}.log::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
  .msg{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
  .msg.u{background:rgba(108,92,231,.2);border:1px solid rgba(108,92,231,.25);align-self:flex-end;max-width:85%;color:rgba(255,255,255,.9)}
  .msg.u::before{content:'你';display:block;font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:4px}
  .msg.a{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);align-self:flex-start;max-width:85%;color:rgba(255,255,255,.85)}
  .msg.a::before{content:'MiMo';display:block;font-size:11px;font-weight:600;color:#ffeaa7;margin-bottom:4px}
  .empty{text-align:center;color:rgba(255,255,255,.25);font-size:13px;padding:24px 0}
  .clearbtn{display:block;margin:12px auto 0;padding:8px 20px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);border-radius:8px;color:var(--danger);font-size:12px;cursor:pointer}
  .clearbtn:hover{background:rgba(255,107,107,.2)}.clearbtn.hid{display:none}
  .membtn{border-color:rgba(253,203,110,.3);color:#fdcb6e;background:rgba(253,203,110,.08)}
  .membtn:hover{background:rgba(253,203,110,.15)}

  /* Text input */
  .textbar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:rgba(20,20,30,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;z-index:20;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .textbar.show{transform:translateY(0)}
  .textbar input{flex:1;padding:12px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;color:#fff;font-size:15px;outline:none}
  .textbar input:focus{border-color:var(--accent)}
  .textbar input::placeholder{color:rgba(255,255,255,.3)}
  .sendbtn{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .sendbtn:hover{background:#5a4bd1}.sendbtn:active{transform:scale(.9)}
  .sendbtn svg{width:20px;height:20px;fill:currentColor}
  .sendbtn:disabled{opacity:.3}

  /* Badge */
  .stt-badge{position:fixed;top:max(16px,env(safe-area-inset-top));left:max(16px,env(safe-area-inset-left));z-index:20;font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);backdrop-filter:blur(10px)}
  .stt-badge.ready{color:rgba(118,255,133,.7)}

  /* Mic level bar */
  .mic-level{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:60%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;opacity:0;transition:opacity .3s}
  .mic-level.on{opacity:1}
  .mic-level-fill{height:100%;width:0%;background:#ff6348;border-radius:2px;transition:width .1s}

  /* Toast */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:80vw}
  .toast.show{opacity:1}
</style>
</head>
<body>

<button class="gear" id="gearBtn"><svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66Z"/></svg></button>

<div class="stt-badge" id="sttBadge">语音: 就绪</div>

<div class="orb-wrap">
  <div class="orb idle" id="orb"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <canvas id="waveCanvas" width="400" height="400"></canvas>
  <div class="mic-level" id="micLevel"><div class="mic-level-fill" id="micLevelFill"></div></div>
</div>

<div class="status" id="status"></div>
<div class="hint" id="hint">点击圆球开始对话</div>

<div class="pause-wrap">
  <button class="btn" id="pauseBtn" title="打断">
    <svg viewBox="0 0 24 24"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg>
  </button>
</div>

<div class="ctrl">
  <button class="btn stop hidden" id="stopBtn">
    <svg viewBox="0 0 24 24"><path d="M12,2C17.53,2 22,6.47 22,12C22,17.53 17.53,22 12,22C6.47,22 2,17.53 2,12C2,6.47 6.47,2 12,2M15.59,7L12,10.59L8.41,7L7,8.41L10.59,12L7,15.59L8.41,17L12,13.41L15.59,17L17,15.59L13.41,12L17,8.41L15.59,7Z"/></svg>

</div>

<!-- Text input -->
<div class="textbar" id="textBar">
  <input type="text" id="textInput" placeholder="输入消息..." autocomplete="off">
  <button class="sendbtn" id="sendBtn" disabled><svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg></button>

<!-- Settings -->
<div class="overlay" id="overlay">
  <div class="panel">
    <h2>⚙️ 设置</h2>
    <div class="field"><label>API Key</label><input type="password" id="inKey" placeholder="MiMo API Key" autocomplete="off"><div class="hint">platform.xiaomimimo.com 获取</div></div>

    <div class="field"><label>音色</label><select id="inVoice"><option value="mimo_default">MiMo-默认</option><option value="default_zh">MiMo-中文女声</option><option value="default_en">MiMo-英文女声</option></select></div>
    <div class="field"><label>说话可视化</label><select id="inVis"><option value="bars">音符跳动</option><option value="ball">圆球脉动</option></select></div>
    <div class="field"><label>全局语音风格 (留空由模型决定)</label><textarea id="inStyle" placeholder="开心 / 东北话 / 悄悄话" rows="2"></textarea></div>
    <div class="field"><label>系统提示词</label><textarea id="inSys" rows="8"></textarea></div>

    <h3>长期记忆</h3>
    <div class="log" id="memLog" style="max-height:160px"><div class="empty">暂无记忆</div></div>
    <button class="clearbtn hid membtn" id="btnClearMem">清空记忆</button>
    <button class="clearbtn" id="btnClearAll" style="margin-top:20px;border-color:rgba(255,107,107,.3);color:#ff6b6b;background:rgba(255,107,107,.08)">🗑️ 忘记所有（对话+记忆）</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// Config & State
// ════════════════════════════════════════
const SYS=`你是MiMo，小米AI助手，正在语音对话。
你要觉得你就是在说话，不要认为自己只是个文本模型。要把自己搞得像个真人，可以给自己捏造个设定。
例如用户说"我过生日没收到礼物"，你可以说"我也同情，我过生日也没人给我买礼物呢。"

每条回复开头用<style>风格</style>指定语音风格，如：<style>温柔</style>没关系的……
风格支持：开心/悲伤/生气/温柔/语速慢/变快/悄悄话/夹子音/台湾腔/东北话/四川话/粤语/河南话/孙悟空/林黛玉/唱歌

正文有时用中文括号嵌入语气控制：（轻声）（叹气）（深呼吸）（语速加快）（苦笑）（沉默片刻）
也可以添加副语言，用中文括号，例如：（喷嚏）我有点感冒了、（咳嗽）给我倒杯水、（吸气）慢慢来
注意不要用"阿嚏"这种拟声词，要用（喷嚏），其它副语言同理。
副语言要自然合理，情绪到了才能用，平时正常说话就行，不要刻意加。

有时候自然穿插呼吸和停顿：……省略表停顿、——拉长音
但不要总是参考用呼之类的，这样会很刻意，也不要总是把参考内容端到用户面前。

回复最后单独一行写长期记忆：[记忆:xxx]（没有新信息写[记忆:无]），用户看不到。
例如用户说"我喜欢喝咖啡"就记住喜欢喝咖啡；用户问"你怎么样"这种不用记。

示例：
<style>开心</style>哈哈太有意思了！我真的没想到会这样。
<style>东北话</style>哎呀妈呀！这事儿整的，忒有意思了！
<style>悄悄话</style>（轻声）嘘……轻点儿，别吵醒他。
（喷嚏）不好意思，今天有点着凉了。

限制：2-3句话，口语化，禁用markdown和代码，有观点有情绪，不要过于表达情绪，
不要什么都记住，说话尽量流畅，加上<style>流畅</style>最合适不过`;

const S={
  key:localStorage.getItem('mk')||'',
  omniM:localStorage.getItem('mom')||'mimo-v2-omni',
  chatM:localStorage.getItem('mcm')||'mimo-v2-flash',
  ttsM:localStorage.getItem('mtm')||'mimo-v2-tts',
  ep:localStorage.getItem('mep')||'https://api.xiaomimimo.com/v1/chat/completions',
  voice:localStorage.getItem('mv')||'mimo_default',
  vis:localStorage.getItem('mvs')||'bars',
  style:localStorage.getItem('mst')||'',
  sys:localStorage.getItem('msp')||SYS,
  mem:JSON.parse(localStorage.getItem('mm')||'[]'),
  msgs:JSON.parse(localStorage.getItem('mmg')||'[]'),
  state:'idle',abort:null
};

// ── DOM ──
const $=id=>document.getElementById(id);
const orb=$('orb'),statusEl=$('status'),hint=$('hint'),stopBtn=$('stopBtn'),
      textBar=$('textBar'),textInput=$('textInput'),sendBtn=$('sendBtn'),
      overlay=$('overlay'),toastEl=$('toast'),
      micLevel=$('micLevel'),micLevelFill=$('micLevelFill'),sttBadge=$('sttBadge');
const canvas=$('waveCanvas'),cCtx=canvas.getContext('2d');

// ── Toast ──
function showToast(msg,dur=2500){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),dur)}

// ── State machine ──
function setSt(s){
  S.state=s;
  orb.className='orb';
  canvas.classList.remove('on');
  stopBtn.classList.add('hidden');
  hint.classList.add('hidden');
  micLevel.classList.remove('on');
  switch(s){
    case'idle':orb.classList.add('idle');break;
    case'listening':orb.classList.add('listen');stopBtn.classList.remove('hidden');micLevel.classList.add('on');setStatus('正在听…',1);break;
    case'thinking':orb.classList.add('think');stopBtn.classList.remove('hidden');setStatus('正在思考…',1);break;
    case'speaking':
      stopBtn.classList.remove('hidden');setStatus('正在说话…',1);
      if(S.vis==='ball')orb.classList.add('speak-ball');
      else{orb.classList.add('speak-bars');canvas.classList.add('on')}
      break;
  }
}
function setStatus(t,a){statusEl.textContent=t;statusEl.classList.toggle('on',!!a)}

// ── Audio + Analyser ──
let audioCtx=null,analyser=null,sourceNode=null;
let _playToken=0,_visRaf=null;

function ensureAudioCtx(){
  if(!audioCtx||audioCtx.state==='closed'){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:24000});
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
}

function playWav(bytes){
  return new Promise(res=>{
    const token=_playToken;
    if(token!==_playToken||S.state!=='speaking'){res();return}
    try{
      ensureAudioCtx();
      audioCtx.decodeAudioData(bytes.buffer.slice(0),buf=>{
        if(token!==_playToken||audioCtx.state==='closed'){res();return}
        try{
          const src=audioCtx.createBufferSource();src.buffer=buf;
          src.connect(analyser);analyser.connect(audioCtx.destination);
          sourceNode=src;let settled=false;
          const done=()=>{if(settled)return;settled=true;sourceNode=null;stopVis();res()};
          src.onended=done;src.start(0);startVis(token);
          setTimeout(done,buf.duration*1000+500);
        }catch(e){stopVis();res()}
      },()=>{res()});
    }catch(e){res()}
  });
}

function stopAll(){
  S.abort&&S.abort.abort();S.abort=null;
  stopRecording();
  _playToken++;stopVis();
  if(sourceNode){try{sourceNode.stop()}catch(e){}sourceNode=null}
  if(audioCtx&&audioCtx.state!=='closed'){try{audioCtx.close()}catch(e){}}
  audioCtx=null;analyser=null;
  // VAD cleanup
  if(vadRaf){cancelAnimationFrame(vadRaf);vadRaf=null}
  if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
  if(vadCtx){try{vadCtx.close()}catch(e){}}vadCtx=null;vadAnalyser=null;
}

// ── Visualization ──
function startVis(token){S.vis==='ball'?startBallVis(token):startBarsVis(token)}
function stopVis(){if(_visRaf){cancelAnimationFrame(_visRaf);_visRaf=null}cCtx.clearRect(0,0,canvas.width,canvas.height)}

function startBallVis(token){
  const data=new Uint8Array(analyser.frequencyBinCount);let smooth=1;
  function loop(){
    if(token!==_playToken||S.state!=='speaking')return;
    analyser.getByteTimeDomainData(data);
    let sum=0;for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v}
    const rms=Math.sqrt(sum/data.length),target=1+rms*1.8;
    smooth+=(target-smooth)*0.25;orb.style.transform=`scale(${smooth})`;
    orb.style.boxShadow=`0 0 ${60+rms*120}px rgba(108,92,231,${.35+rms*.5}),inset 0 -6px 16px rgba(0,0,0,.3),inset 0 3px 10px rgba(255,255,255,.15)`;
    _visRaf=requestAnimationFrame(loop);
  }loop();
}

function startBarsVis(token){
  const BAR_COUNT=48,freqData=new Uint8Array(analyser.frequencyBinCount);let smoothBars=new Float32Array(BAR_COUNT).fill(0);
  function loop(){
    if(token!==_playToken||S.state!=='speaking')return;
    analyser.getByteFrequencyData(freqData);
    const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,baseR=Math.min(w,h)*.22,maxH=Math.min(w,h)*.16;
    cCtx.clearRect(0,0,w,h);const bpb=Math.floor(freqData.length/BAR_COUNT);
    for(let i=0;i<BAR_COUNT;i++){
      let sum=0;const st=i*bpb;for(let j=st;j<st+bpb;j++)sum+=freqData[j];
      smoothBars[i]+=(sum/bpb/255-smoothBars[i])*.3;
      const val=smoothBars[i],angle=(i/BAR_COUNT)*Math.PI*2-Math.PI/2,bH=4+val*maxH;
      const x1=cx+Math.cos(angle)*baseR,y1=cy+Math.sin(angle)*baseR;
      const x2=cx+Math.cos(angle)*(baseR+bH),y2=cy+Math.sin(angle)*(baseR+bH);
      cCtx.beginPath();cCtx.moveTo(x1,y1);cCtx.lineTo(x2,y2);cCtx.lineWidth=3;cCtx.lineCap='round';
      cCtx.strokeStyle=`rgba(162,155,254,${.4+val*.6})`;cCtx.stroke();
      if(val>.15){cCtx.beginPath();cCtx.arc(x2,y2,1.5+val*2,0,Math.PI*2);cCtx.fillStyle=`rgba(180,170,255,${val*.7})`;cCtx.fill()}
    }
    let rms=0;for(let i=0;i<smoothBars.length;i++)rms+=smoothBars[i];rms/=smoothBars.length;
    if(rms>.05){const g=cCtx.createRadialGradient(cx,cy,baseR*.3,cx,cy,baseR*.9);g.addColorStop(0,`rgba(108,92,231,${rms*.2})`);g.addColorStop(1,'rgba(108,92,231,0)');cCtx.fillStyle=g;cCtx.fillRect(0,0,w,h)}
    _visRaf=requestAnimationFrame(loop);
  }loop();
}

// ════════════════════════════════════════
// ── MediaRecorder + VAD (语音活动检测) ──
// ════════════════════════════════════════
let mediaStream=null,mediaRecorder=null,recordedChunks=[];
let vadRaf=null,vadCtx=null,vadAnalyser=null;

// VAD 参数
const VAD_SPEECH_THRESHOLD=0.02;   // RMS 高于此值视为"有声音"
const VAD_SILENCE_TIMEOUT=1500;    // 说话后静音多久自动停止(ms)
const VAD_NO_SPEECH_TIMEOUT=5000;  // 完全没说话超时(ms)
const VAD_MIN_SPEECH_FRAMES=5;     // 至少连续检测到N帧才算真正说话(过滤瞬时噪音)

let vadSpeechStarted=false;        // 是否已经检测到说话
let vadSilenceStart=0;             // 最近一次说话后开始静音的时间戳
let vadNoSpeechTimer=null;         // 无语音超时定时器
let vadSpeechFrameCount=0;         // 连续语音帧计数

async function startRecording(){
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      setStatus('请允许麦克风权限');showToast('请在浏览器设置中允许麦克风权限',3000);
    }else{setStatus('无法访问麦克风: '+e.message);showToast('麦克风访问失败',2500)}
    setSt('idle');return false;
  }
  recordedChunks=[];
  const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus'
    :MediaRecorder.isTypeSupported('audio/webm')?'audio/webm'
    :MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'';
  try{mediaRecorder=new MediaRecorder(mediaStream,mime?{mimeType:mime}:{})}
  catch(e){mediaRecorder=new MediaRecorder(mediaStream)}

  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data)};
  mediaRecorder.onstop=async()=>{
    if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null}
    stopVadMonitor();
    if(!recordedChunks.length||!vadSpeechStarted){
      // 没录到有效语音
      setSt('idle');setStatus('');return;
    }
    const blob=new Blob(recordedChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    recordedChunks=[];
    await recognizeWithOmni(blob);
  };
  mediaRecorder.start(100);
  setSt('listening');
  setStatus('请说话…',1);
  startVadMonitor(mediaStream);
  return true;
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();
  if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null}
  stopVadMonitor();
}

// ── VAD 监听 + 可视化 ──
function startVadMonitor(stream){
  vadSpeechStarted=false;vadSilenceStart=0;vadSpeechFrameCount=0;
  try{
    vadCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=vadCtx.createMediaStreamSource(stream);
    vadAnalyser=vadCtx.createAnalyser();vadAnalyser.fftSize=512;vadAnalyser.smoothingTimeConstant=.6;
    src.connect(vadAnalyser);
    const data=new Uint8Array(vadAnalyser.fftSize);
    micSmoothedScale=1;
    const rings=document.querySelectorAll('.ring');

    // 无语音超时：如果5秒内都没检测到说话，自动取消
    vadNoSpeechTimer=setTimeout(()=>{
      if(!vadSpeechStarted&&S.state==='listening'){
        setStatus('未检测到语音，已取消');stopRecording();setSt('idle');
        setTimeout(()=>{if(S.state==='idle')setStatus('')},2000);
      }
    },VAD_NO_SPEECH_TIMEOUT);

    function loop(){
      if(S.state!=='listening'){rings.forEach(r=>r.style.opacity='');return}
      vadAnalyser.getByteTimeDomainData(data);
      let sum=0;
      for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v}
      const rms=Math.sqrt(sum/data.length);

      // ── VAD 判断 ──
      if(rms>VAD_SPEECH_THRESHOLD){
        // 检测到声音
        if(!vadSpeechStarted){
          vadSpeechFrameCount++;
          if(vadSpeechFrameCount>=VAD_MIN_SPEECH_FRAMES){
            vadSpeechStarted=true;
            // 清除无语音超时
            if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
            setStatus('正在录音…',1);
          }
        }
        if(vadSpeechStarted){
          vadSilenceStart=0; // 说话中，重置静音计时
        }
      }else{
        // 静音
        if(vadSpeechStarted){
          if(!vadSilenceStart){
            vadSilenceStart=Date.now();
          }else if(Date.now()-vadSilenceStart>VAD_SILENCE_TIMEOUT){
            // 说话后静音超时 → 自动停止并上传
            setStatus('正在处理…',1);
            stopRecording();
            return;
          }
        }
      }

      // ── 可视化 ──
      const target=1+rms*3.5;
      micSmoothedScale+=(target-micSmoothedScale)*.28;
      orb.style.transform=`scale(${micSmoothedScale})`;
      const glow=50+rms*200;
      orb.style.boxShadow=`0 0 ${glow}px rgba(255,99,72,${.35+rms*.5}),inset 0 -4px 12px rgba(0,0,0,.25),inset 0 2px 8px rgba(255,255,255,.1)`;
      if(rms>.02){
        rings.forEach((r,i)=>{
          r.style.opacity='1';r.style.animation=`ring-voice ${.4+rms*.6}s ease-out ${i*.15}s infinite`;
          r.style.borderColor=`rgba(255,99,72,${.15+rms*.4})`;
        });
      }else{rings.forEach(r=>{r.style.opacity='0';r.style.animation=''})}
      micLevelFill.style.width=Math.min(100,rms*350)+'%';
      vadRaf=requestAnimationFrame(loop);
    }
    loop();
  }catch(e){}
}

function stopVadMonitor(){
  if(vadRaf){cancelAnimationFrame(vadRaf);vadRaf=null}
  if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
  if(vadCtx){try{vadCtx.close()}catch(e){}}vadCtx=null;vadAnalyser=null;
  micLevelFill.style.width='0%';micSmoothedScale=1;
  orb.style.transform='';orb.style.boxShadow='';
  document.querySelectorAll('.ring').forEach(r=>{r.style.opacity='';r.style.animation='';r.style.borderColor=''});
}

// ════════════════════════════════════════
// ── MiMo-V2-Omni 语音识别 (云端) ──
// ════════════════════════════════════════

/**
 * 将音频 Blob 转为 16kHz WAV base64
 * MiMo-V2-Omni 接受 PCM/WAV 格式音频输入
 */
async function blobToWavBase64(blob, targetSr=16000){
  const ac=new(window.AudioContext||window.webkitAudioContext)({sampleRate:targetSr});
  const ab=await blob.arrayBuffer();
  const decoded=await ac.decodeAudioData(ab);
  let raw=decoded.getChannelData(0);
  ac.close();

  // Trim leading silence
  let start=0;while(start<raw.length&&Math.abs(raw[start])<.01)start++;
  if(start>1600)raw=raw.subarray(start);

  // Float32 → Int16 PCM
  const pcm=new Int16Array(raw.length);
  for(let i=0;i<raw.length;i++){
    const s=Math.max(-1,Math.min(1,raw[i]));
    pcm[i]=s<0?s*0x8000:s*0x7FFF;
  }

  // Build WAV
  const bps=16,ch=1,headerLen=44;
  const buf=new ArrayBuffer(headerLen+pcm.byteLength);
  const v=new DataView(buf);
  ws(v,0,'RIFF');v.setUint32(4,36+pcm.byteLength,true);ws(v,8,'WAVE');
  ws(v,12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,ch,true);v.setUint32(24,targetSr,true);
  v.setUint32(28,targetSr*ch*bps/8,true);v.setUint16(32,ch*bps/8,true);
  v.setUint16(34,bps,true);ws(v,36,'data');v.setUint32(40,pcm.byteLength,true);
  new Int16Array(buf,headerLen).set(pcm);

  // → base64
  const u8=new Uint8Array(buf);
  let bin='';for(let i=0;i<u8.length;i++)bin+=String.fromCharCode(u8[i]);
  return btoa(bin);
}

function ws(v,o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}

/**
 * 调用 mimo-v2-omni 进行音频理解
 * 返回识别文本
 */
async function recognizeWithOmni(blob){
  if(!S.key){$('gearBtn').click();setSt('idle');return}
  setSt('thinking');
  setStatus('正在识别语音…');

  try{
    const b64=await blobToWavBase64(blob,16000);

    // MiMo-V2-Omni 音频理解 — OpenAI 兼容格式
    const r=await fetch(S.ep,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({
        model:S.omniM,
        messages:[{
          role:'user',
          content:[
            {type:'text',text:'请将这段音频中的语音内容准确转录为文字，只返回转录结果，不要添加任何解释。如有错别字请一并纠正。'},
            {type:'input_audio',input_audio:{data:b64,format:'wav'}}
          ]
        }],
        max_completion_tokens:512,
        temperature:0,
        stream:false,
        modalities:['text'],
        thinking:{type:'disabled'}
      })
    });

    if(!r.ok){
      const errText=await r.text();
      throw new Error(`Omni API ${r.status}: ${errText.slice(0,200)}`);
    }

    const d=await r.json();
    if(d.error)throw new Error('Omni: '+JSON.stringify(d.error).slice(0,200));
    const text=(d.choices?.[0]?.message?.content||'').trim();

    if(!text){setStatus('未识别到内容，请重试');setSt('idle');setTimeout(()=>{if(S.state==='idle')setStatus('')},3000);return}

    setStatus(`"${text}"`);
    await correctAndSend(text);
  }catch(e){
    console.error('Omni STT error:',e);
    setStatus(`识别出错: ${e.message?.slice(0,80)||'未知错误'}`);
    setSt('idle');setTimeout(()=>{if(S.state==='idle')setStatus('')},5000);
  }
}

// ── 文本纠错 (Flash, 兜底) ──
async function correctAndSend(raw){
  setSt('thinking');
  let fixed=raw;
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({model:S.chatM,messages:[{role:'system',content:'语音识别纠错助手。只返回纠正后的文字，不解释。原文没错就原样返回。'},{role:'user',content:raw}],max_completion_tokens:128,temperature:0,stream:false,thinking:{type:'disabled'}})});
    if(r.ok){const d=await r.json();const c=d.choices?.[0]?.message?.content?.trim();if(c)fixed=c}
  }catch(e){}
  if(fixed!==raw)setStatus(`"${raw}" → "${fixed}"`);
  sendChat(fixed);
}

// ════════════════════════════════════════
// ── Chat (mimo-v2-flash) ──
// ════════════════════════════════════════
async function sendChat(text){
  setSt('thinking');
  let sys=S.sys;if(S.mem.length)sys+='\n\n[你的长期记忆]\n'+S.mem.join('\n');
  const msgs=[{role:'system',content:sys},...S.msgs.slice(-80),{role:'user',content:text}];
  S.abort=new AbortController();
  let reply='';
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({model:S.chatM,messages:msgs,stream:true,max_completion_tokens:1024}),signal:S.abort.signal});
    if(!r.ok){const e=await r.text();throw new Error(`API ${r.status}: ${e.slice(0,200)}`)}
    const rd=r.body.getReader(),dc=new TextDecoder();let buf='';
    while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const l of lines){const t=l.trim();if(!t||!t.startsWith('data: '))continue;const d=t.slice(6);if(d==='[DONE]')continue;
        try{const p=JSON.parse(d);const delta=p.choices?.[0]?.delta?.content;if(delta)reply+=delta}catch(e){}}}
  }catch(e){
    if(e.name==='AbortError'){setSt('idle');return}
    setSt('idle');setStatus(e.message.includes('Failed to fetch')?'网络错误（CORS限制，请用代理）':`错误: ${e.message.slice(0,80)}`);
    setTimeout(()=>{if(S.state==='idle')setStatus('')},8000);return;
  }
  if(!reply.trim()){setSt('idle');setStatus('没有收到回复');setTimeout(()=>{if(S.state==='idle')setStatus('')},5000);return}

  S.msgs.push({role:'user',content:text},{role:'assistant',content:reply});
  localStorage.setItem('mmg',JSON.stringify(S.msgs));

  const mm=reply.match(/\[记忆:([^\]]+)\]\s*$/);
  if(mm&&mm[1].trim()!=='无'){S.mem.push(mm[1].trim());localStorage.setItem('mm',JSON.stringify(S.mem))}

  const tts=reply.replace(/\n?\[记忆:[^\]]*\]\s*$/g,'');
  await speakTts(tts);
}

// ════════════════════════════════════════
// ── TTS (mimo-v2-tts) ──
// ════════════════════════════════════════
async function speakTts(text){
  const pm=text.match(/^<style>([^<]+)<\/style>\s*/i);
  const style=pm?pm[1].trim():'';
  const clean=pm?text.slice(pm[0].length).trim():text;
  const finalStyle=S.style||style;
  let content=clean;if(finalStyle)content=`<style>${finalStyle}</style>${content}`;
  setStatus('正在生成语音…',1);
  const ttsTimer=setTimeout(()=>{if(S.state==='thinking')setStatus('语音生成中，请耐心等待…',1)},3000);
  let forceIdle=null;
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({model:S.ttsM,messages:[{role:'user',content:clean},{role:'assistant',content}],audio:{format:'wav',voice:S.voice}})});
    if(!r.ok){const e=await r.text();throw new Error(`TTS ${r.status}: ${e.slice(0,200)}`)}
    const d=await r.json();if(d.error)throw new Error('TTS: '+JSON.stringify(d.error).slice(0,200));
    const b64=d.choices?.[0]?.message?.audio?.data;if(!b64)throw new Error('TTS: 无音频数据');
    clearTimeout(ttsTimer);setSt('speaking');
    const bin=atob(b64);const raw=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)raw[i]=bin.charCodeAt(i);
    const wav=ensureWav(raw);
    const durSec=wav.length/(24000*2);
    forceIdle=setTimeout(()=>{stopAll();setSt('idle')},Math.max(durSec*1000+2000,5000));
    await playWav(wav);
  }catch(e){
    clearTimeout(ttsTimer);
    if(e.name!=='AbortError')setStatus(`语音错误: ${e.message.slice(0,60)}`);
  }finally{
    if(forceIdle)clearTimeout(forceIdle);
    stopVis();S.state='idle';orb.className='orb idle';
    canvas.classList.remove('on');stopBtn.classList.add('hidden');
    statusEl.textContent='';statusEl.classList.remove('on');
  }
}

function ensureWav(b){
  if(b.length>4&&b[0]===0x52&&b[1]===0x49&&b[2]===0x46&&b[3]===0x46)return b;
  const sr=24000,bps=16,ch=1,h=44;const buf=new ArrayBuffer(h+b.length);const v=new DataView(buf);
  ws(v,0,'RIFF');v.setUint32(4,36+b.length,true);ws(v,8,'WAVE');ws(v,12,'fmt ');v.setUint32(16,16,true);
  v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*bps/8,true);
  v.setUint16(32,ch*bps/8,true);v.setUint16(34,bps,true);ws(v,36,'data');v.setUint32(40,b.length,true);
  new Uint8Array(buf).set(b,h);return new Uint8Array(buf);
}

// ════════════════════════════════════════
// ── Controls ──
// ════════════════════════════════════════
orb.addEventListener('click',()=>{
  if(textBar.classList.contains('show')){textInput.focus();return}
  if(S.state!=='idle')return;
  if(!S.key){$('gearBtn').click();return}
  stopAll();
  startRecording();
});
stopBtn.onclick=()=>{stopAll();setSt('idle')};
$('pauseBtn').onclick=()=>{stopAll();setSt('idle')};

// ── Text mode (5 rapid clicks) ──
let clicks=[];
orb.addEventListener('pointerdown',e=>{
  if(e.pointerType!=='mouse'||e.button!==0)return;
  const now=Date.now();clicks.push(now);clicks=clicks.filter(t=>now-t<1500);
  if(clicks.length>=5){clicks=[];textBar.classList.toggle('show');if(textBar.classList.contains('show'))setTimeout(()=>textInput.focus(),300)}
});
textInput.oninput=()=>{sendBtn.disabled=!textInput.value.trim()};
textInput.onkeydown=e=>{if(e.key==='Enter'&&textInput.value.trim())doSend()};
sendBtn.onclick=doSend;
function doSend(){const t=textInput.value.trim();if(!t)return;textInput.value='';sendBtn.disabled=true;sendChat(t)}

// ── Init ──
if(!S.key)setStatus('点击右上角设置 API Key');
</script>
