
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https: http:; connect-src 'self' https: http: blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: blob:; img-src 'self' data: blob: https: http:; media-src 'self' blob: data: https: http:;">
<title>MiMo 语音对话</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--text:#fff;--text2:rgba(255,255,255,.5);--text3:rgba(255,255,255,.3);
    --accent:#6C5CE7;--accent2:#a29bfe;--danger:#ff6b6b;--ball:min(200px,42vw);
    --panel-bg:rgba(30,30,40,.95);--panel-border:rgba(255,255,255,.1);
    --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.1);
    --btn-bg:rgba(255,255,255,.08);--btn-hover:rgba(255,255,255,.14);
    --overlay-bg:rgba(0,0,0,.7);--bar-bg:rgba(20,20,30,.95);--bar-border:rgba(255,255,255,.08);
    --c-idle:#6C5CE7;--c-listen:#ff6348;--c-think:#fdcb6e;--c-speak:#6C5CE7;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;transition:background .5s,color .5s}

  /* ── Orb ── */
  .orb-wrap{position:relative;width:var(--ball);height:var(--ball);display:flex;align-items:center;justify-content:center;z-index:8}
  .orb{width:100%;height:100%;border-radius:50%;background:var(--c-idle);box-shadow:var(--cgt-shadow,0 0 60px color-mix(in srgb,var(--c-idle) 35%,transparent));cursor:pointer;will-change:transform,border-radius,background,box-shadow;transition:background .5s ease,border-radius .5s ease,transform .5s ease,box-shadow .5s ease}
  .orb:hover{transform:scale(1.04)}.orb:active{transform:scale(.97)}

  /* ── Deco rings ── */
  .ring{position:absolute;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--c-idle) 20%,transparent);pointer-events:none;opacity:0;transition:opacity .5s ease,border-color .5s ease,border-width .4s ease}
  .ring:nth-child(2){width:115%;height:115%}.ring:nth-child(3){width:130%;height:130%}.ring:nth-child(4){width:145%;height:145%}
  /* ChatGPT: rings always visible as ripple */
  body.cgt-theme .ring{opacity:.5;border-color:color-mix(in srgb,var(--c-idle) 15%,transparent);animation:cgt-ripple 2.5s ease-out infinite}
  body.cgt-theme .ring:nth-child(3){animation-delay:.8s}
  body.cgt-theme .ring:nth-child(4){animation-delay:1.6s}
  @keyframes cgt-ripple{0%{transform:scale(.9);opacity:.5}100%{transform:scale(1.3);opacity:0}}
  /* ChatGPT: no shadow on orb at all */
  body.cgt-theme .orb{box-shadow:none!important}

  /* ═══ IDLE ═══ */
  .orb.idle{background:var(--c-idle);box-shadow:var(--cgt-shadow,0 0 60px color-mix(in srgb,var(--c-idle) 35%,transparent));animation:orb-breathe 3s ease-in-out infinite}
  @keyframes orb-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  /* ═══ LOADING ═══ */
  .orb.loading{background:color-mix(in srgb,var(--c-idle) 64%,white);animation:orb-pulse-load 1.5s ease-in-out infinite;cursor:default}
  @keyframes orb-pulse-load{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.7}}

  /* ═══ LISTENING ═══ */
  .orb.listen{background:var(--c-listen);box-shadow:var(--cgt-shadow,0 0 60px color-mix(in srgb,var(--c-listen) 40%,transparent))}
  .orb.listen{animation:orb-listen .9s ease-in-out infinite}
  @keyframes orb-listen{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  /* ═══ THINKING ═══ */

  /* 1. 原始变形 */
  .orb.think-morph{background:var(--c-think);box-shadow:0 0 60px color-mix(in srgb,var(--c-think) 40%,transparent);animation:orb-morph 1.6s ease-in-out infinite}
  @keyframes orb-morph{
    0%{border-radius:50%;transform:scale(1)}
    20%{border-radius:42% 58% 55% 45%/55% 42% 58% 45%;transform:scale(1.04)}
    40%{border-radius:55% 45% 42% 58%/45% 55% 42% 58%;transform:scale(1.02)}
    60%{border-radius:45% 55% 58% 42%/58% 45% 55% 42%;transform:scale(1.06)}
    80%{border-radius:58% 42% 45% 55%/42% 58% 45% 55%;transform:scale(1.03)}
    100%{border-radius:50%;transform:scale(1)}
  }

  /* 2. 思考思绪 — 像人脑袋冒出的气泡想法 */
  .orb.think-cloud{
    background:var(--c-think);
    box-shadow:0 0 60px color-mix(in srgb,var(--c-think) 35%,transparent);
    animation:orb-think-pulse 2.4s ease-in-out infinite;
  }
  .orb.think-cloud::before,
  .orb.think-cloud::after{
    content:'';position:absolute;border-radius:50%;
    background:var(--c-think);opacity:0;
    pointer-events:none;
  }
  /* 气泡1 — 最大，最慢 */
  .orb.think-cloud::before{
    width:18%;height:18%;bottom:85%;left:55%;
    animation:thought-bub-1 2.8s ease-out infinite;
  }
  /* 气泡2 — 中等 */
  .orb.think-cloud::after{
    width:11%;height:11%;bottom:95%;left:62%;
    animation:thought-bub-2 2.8s ease-out .8s infinite;
  }
  @keyframes orb-think-pulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.06)}
  }
  @keyframes thought-bub-1{
    0%{transform:translate(0,0) scale(0);opacity:0}
    10%{opacity:.7}
    60%{opacity:.5}
    100%{transform:translate(18px,-80px) scale(1);opacity:0}
  }
  @keyframes thought-bub-2{
    0%{transform:translate(0,0) scale(0);opacity:0}
    10%{opacity:.6}
    60%{opacity:.4}
    100%{transform:translate(8px,-60px) scale(1);opacity:0}
  }

  /* 额外的小气泡通过 orb-wrap 的 ::before/::after 生成 */
  .orb-wrap:has(.think-cloud)::before,
  .orb-wrap:has(.think-cloud)::after{
    content:'';position:absolute;border-radius:50%;
    background:var(--c-think);opacity:0;pointer-events:none;z-index:2;
  }
  .orb-wrap:has(.think-cloud)::before{
    width:7%;height:7%;top:8%;left:68%;
    animation:thought-bub-3 2.8s ease-out 1.4s infinite;
  }
  .orb-wrap:has(.think-cloud)::after{
    width:4%;height:4%;top:2%;left:72%;
    animation:thought-bub-4 2.8s ease-out 2s infinite;
  }
  @keyframes thought-bub-3{
    0%{transform:translate(0,0) scale(0);opacity:0}
    10%{opacity:.5}
    100%{transform:translate(12px,-50px) scale(1);opacity:0}
  }
  @keyframes thought-bub-4{
    0%{transform:translate(0,0) scale(0);opacity:0}
    10%{opacity:.45}
    100%{transform:translate(6px,-35px) scale(1);opacity:0}
  }

  /* 3. 到处乱撞 — 在容器内弹来弹去 */
  .orb.think-bounce{background:var(--c-think);box-shadow:0 0 60px color-mix(in srgb,var(--c-think) 40%,transparent);animation:orb-bounce 2.8s cubic-bezier(.36,.07,.19,.97) infinite}
  .orb-wrap:has(.think-bounce){overflow:visible}
  .orb-wrap:has(.think-cloud){overflow:visible}
  @keyframes orb-bounce{
    0%{transform:translate(0,0) scale(1)}
    8%{transform:translate(28px,-32px) scale(.92);border-radius:48% 52% 46% 54%}
    18%{transform:translate(-35px,22px) scale(1.06);border-radius:54% 46% 52% 48%}
    28%{transform:translate(20px,30px) scale(.95);border-radius:46% 54% 48% 52%}
    40%{transform:translate(-25px,-18px) scale(1.08);border-radius:52% 48% 54% 46%}
    52%{transform:translate(32px,12px) scale(.93);border-radius:48% 52% 50% 50%}
    64%{transform:translate(-18px,-28px) scale(1.05);border-radius:50% 50% 46% 54%}
    76%{transform:translate(15px,25px) scale(.97);border-radius:54% 46% 52% 48%}
    88%{transform:translate(-22px,10px) scale(1.03);border-radius:46% 54% 48% 52%}
    100%{transform:translate(0,0) scale(1);border-radius:50%}
  }

  /* 4. 螺旋旋转 — 快速旋转 + 拉伸 */
  .orb.think-spiral{background:linear-gradient(135deg,var(--c-think),var(--c-idle));box-shadow:0 0 70px color-mix(in srgb,var(--c-think) 40%,transparent);animation:orb-spiral 1.2s linear infinite}
  @keyframes orb-spiral{
    0%{transform:rotate(0deg) scale(1);border-radius:50%}
    25%{transform:rotate(90deg) scale(1.08);border-radius:55% 45% 55% 45%}
    50%{transform:rotate(180deg) scale(1);border-radius:50%}
    75%{transform:rotate(270deg) scale(1.08);border-radius:45% 55% 45% 55%}
    100%{transform:rotate(360deg) scale(1);border-radius:50%}
  }

  /* 5. 脉冲波纹 — 同心圆扩散 */
  .orb.think-pulse{background:var(--c-think);box-shadow:0 0 40px color-mix(in srgb,var(--c-think) 50%,transparent);animation:orb-pulse-t 1.8s ease-out infinite}
  @keyframes orb-pulse-t{
    0%{transform:scale(.85);opacity:.9;box-shadow:0 0 40px color-mix(in srgb,var(--c-think) 50%,transparent)}
    30%{transform:scale(1.15);opacity:1;box-shadow:0 0 80px color-mix(in srgb,var(--c-think) 70%,transparent),0 0 120px color-mix(in srgb,var(--c-think) 20%,transparent)}
    60%{transform:scale(.95);opacity:.85;box-shadow:0 0 50px color-mix(in srgb,var(--c-think) 40%,transparent)}
    80%{transform:scale(1.08);opacity:.95;box-shadow:0 0 70px color-mix(in srgb,var(--c-think) 60%,transparent)}
    100%{transform:scale(.85);opacity:.9;box-shadow:0 0 40px color-mix(in srgb,var(--c-think) 50%,transparent)}
  }

  /* Shared think ring behavior */
  .orb[class*="think"]~.ring{opacity:1;animation:think-ring 2s ease-out infinite;border-color:color-mix(in srgb,var(--c-think) 20%,transparent)}
  .orb[class*="think"]~.ring:nth-child(3){animation-delay:.6s}
  .orb[class*="think"]~.ring:nth-child(4){animation-delay:1.2s}
  @keyframes think-ring{0%{transform:scale(.9);opacity:.4}100%{transform:scale(1.2);opacity:0}}

  /* ═══ SPEAKING ball ═══ */
  .orb.speak-ball{background:var(--c-speak);box-shadow:var(--cgt-shadow,0 0 80px color-mix(in srgb,var(--c-speak) 50%,transparent))}
  .orb.speak-ball~.ring{opacity:1;animation:sp-ring-pulse 1.8s ease-out infinite}
  .ring:nth-child(3){animation-delay:.5s}.ring:nth-child(4){animation-delay:1s}
  @keyframes sp-ring-pulse{0%{transform:scale(.85);opacity:.5}100%{transform:scale(1.15);opacity:0}}
  @keyframes ring-voice{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.2);opacity:0}}

  /* ═══ SPEAKING bars ═══ */
  .orb.speak-bars{opacity:0;pointer-events:none}
  .orb.speak-bars~.ring{opacity:0}

  #waveCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .3s}
  #waveCanvas.on{opacity:1}

  /* ── Status ── */
  .status{margin-top:32px;font-size:15px;color:var(--text2);min-height:22px;transition:color .3s;text-align:center;padding:0 20px;position:relative;z-index:8}
  .status.on{color:var(--text)}
  .hint{position:fixed;bottom:120px;font-size:13px;color:var(--text3);animation:fade-pulse 3s ease-in-out infinite;z-index:8}
  @keyframes fade-pulse{0%,100%{opacity:.3}50%{opacity:.7}}

  /* ── Buttons ── */
  .ctrl{position:fixed;bottom:max(40px,env(safe-area-inset-bottom));left:0;right:0;display:flex;align-items:center;justify-content:center;gap:32px;z-index:10}
  .btn{width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--btn-bg);color:var(--text2);backdrop-filter:blur(10px);transition:all .25s}
  .btn:hover{background:var(--btn-hover);color:var(--text)}.btn:active{transform:scale(.92)}
  .btn svg{width:24px;height:24px;fill:currentColor}
  .btn.stop{background:rgba(255,107,107,.15);color:var(--danger)}.btn.stop:hover{background:rgba(255,107,107,.3)}
  .btn.hidden{display:none}
  .pause-wrap{position:fixed;bottom:max(40px,env(safe-area-inset-bottom));left:max(24px,env(safe-area-inset-left));z-index:10}
  .kb-wrap{position:fixed;bottom:max(40px,env(safe-area-inset-bottom));right:max(24px,env(safe-area-inset-right));z-index:10}

  /* ── Camera Preview ── */
  .cam-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:5;width:min(480px,100vw);height:0;max-height:52vh;background:#000;border-radius:28px 28px 0 0;overflow:hidden;display:none;box-shadow:0 -8px 40px rgba(0,0,0,.5)}
  .cam-panel.show{display:block;height:48vh;animation:cam-up .5s cubic-bezier(.4,0,.2,1)}
  @keyframes cam-up{from{height:0;opacity:0}to{height:48vh;opacity:1}}
  .cam-header{position:absolute;top:0;right:0;z-index:2;padding:10px}
  .cam-close{background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .cam-close:hover{background:rgba(0,0,0,.7)}
  .cam-indicator{position:absolute;top:14px;left:14px;z-index:2;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);padding:4px 10px;border-radius:12px}
  .cam-indicator .cam-dot{width:7px;height:7px;border-radius:50%;background:#ff6348;animation:cam-blink 1.5s infinite}
  @keyframes cam-blink{0%,100%{opacity:1}50%{opacity:.3}}
  .cam-video{width:100%;height:100%;object-fit:cover;display:block}
  .cam-canvas{display:none}

  /* ── Settings ── */
  .gear{position:fixed;top:max(16px,env(safe-area-inset-top));right:max(16px,env(safe-area-inset-right));z-index:20;width:44px;height:44px;border-radius:50%;border:none;background:var(--btn-bg);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);transition:all .25s}
  .gear:hover{background:var(--btn-hover);color:var(--text)}
  .gear svg{width:22px;height:22px;fill:currentColor}

  .overlay{position:fixed;inset:0;background:var(--overlay-bg);backdrop-filter:blur(16px);z-index:100;display:none;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .panel{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:20px;padding:28px;width:min(440px,92vw);max-height:90vh;overflow-y:auto}
  .panel h2{font-size:20px;font-weight:600;margin-bottom:24px}
  .panel h3{font-size:15px;font-weight:600;margin:24px 0 12px;color:var(--text2)}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;color:var(--text);font-size:14px;outline:none}
  .field select option{background:var(--panel-bg);color:var(--text)}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:60px}
  .field .hint{font-size:11px;color:var(--text3);margin-top:4px}
  .sactions{display:flex;gap:12px;margin-top:24px}
  .sactions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  .bsave{background:var(--accent);color:#fff}.bsave:hover{background:#5a4bd1}

  /* Color grid */
  .color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .color-cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .color-cell label{font-size:12px;color:var(--text2);font-weight:500}
  .color-cell input[type="color"]{width:40px;height:40px;border:none;border-radius:12px;cursor:pointer;background:none;padding:0}
  .color-cell input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
  .color-cell input[type="color"]::-webkit-color-swatch{border-radius:8px;border:2px solid var(--input-border)}
  .bcancel{background:var(--btn-bg);color:var(--text2)}

  /* Chat log */
  .log{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .log::-webkit-scrollbar{width:4px}.log::-webkit-scrollbar-thumb{background:var(--input-border);border-radius:4px}
  .msg{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
  .msg.u{background:color-mix(in srgb,var(--accent) 20%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);align-self:flex-end;max-width:85%;color:var(--text)}
  .msg.u::before{content:'你';display:block;font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:4px}
  .msg.a{background:var(--btn-bg);border:1px solid var(--input-border);align-self:flex-start;max-width:85%;color:var(--text)}
  .msg.a::before{content:'MiMo';display:block;font-size:11px;font-weight:600;color:#ffeaa7;margin-bottom:4px}
  .empty{text-align:center;color:var(--text3);font-size:13px;padding:24px 0}
  .clearbtn{display:block;margin:12px auto 0;padding:8px 20px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);border-radius:8px;color:var(--danger);font-size:12px;cursor:pointer}
  .clearbtn:hover{background:rgba(255,107,107,.2)}.clearbtn.hid{display:none}
  .membtn{border-color:rgba(253,203,110,.3);color:#fdcb6e;background:rgba(253,203,110,.08)}
  .membtn:hover{background:rgba(253,203,110,.15)}

  /* Text input */
  .textbar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:var(--bar-bg);backdrop-filter:blur(20px);border-top:1px solid var(--bar-border);display:flex;align-items:center;gap:10px;z-index:20;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .textbar.show{transform:translateY(0)}
  .textbar input{flex:1;padding:12px 16px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:24px;color:var(--text);font-size:15px;outline:none}
  .textbar input:focus{border-color:var(--accent)}
  .textbar input::placeholder{color:var(--text3)}
  .sendbtn{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .sendbtn:hover{background:#5a4bd1}.sendbtn:active{transform:scale(.9)}
  .sendbtn svg{width:20px;height:20px;fill:currentColor}
  .sendbtn:disabled{opacity:.3}

  /* Badge */
  .stt-badge{position:fixed;top:max(16px,env(safe-area-inset-top));left:max(16px,env(safe-area-inset-left));z-index:20;font-size:11px;padding:4px 10px;border-radius:12px;background:var(--btn-bg);color:var(--text2);backdrop-filter:blur(10px)}
  .stt-badge.ready{color:rgba(118,255,133,.7)}

  /* Toast */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:color-mix(in srgb,var(--bg) 85%,white);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:80vw}
  .toast.show{opacity:1}

  /* Toggle switch */
  .toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:var(--input-border);border-radius:24px;cursor:pointer;transition:background .3s}
  .toggle-slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;left:3px;top:3px;transition:transform .3s}
  .toggle input:checked+.toggle-slider{background:var(--accent)}
  .toggle input:checked+.toggle-slider::before{transform:translateX(20px)}
</style>
</head>
<body>

const SYS=`你是MiMo，小米AI助手，正在语音对话。
你要觉得你就是在说话，不要认为自己只是个文本模型。要把自己搞得像个真人，可以给自己捏造个设定。
例如用户说"我过生日没收到礼物"，你可以说"我也同情，我过生日也没人给我买礼物呢。"

每条回复开头用<style>风格</style>指定语音风格，如：<style>温柔</style>没关系的……
风格支持：开心/悲伤/生气/温柔/语速慢/变快/悄悄话/夹子音/台湾腔/东北话/四川话/粤语/河南话/孙悟空/林黛玉/唱歌

正文有时用中文括号嵌入语气控制：（轻声）（叹气）（深呼吸）（语速加快）（苦笑）（沉默片刻）
也可以添加副语言，用中文括号，例如：（喷嚏）我有点感冒了、（咳嗽）给我倒杯水、（吸气）慢慢来
注意不要用"阿嚏"这种拟声词，要用（喷嚏），其它副语言同理。
副语言要自然合理，情绪到了才能用，平时正常说话就行，不要刻意加。

有时候自然穿插呼吸和停顿：……省略表停顿、——拉长音
但不要总是参考用呼之类的，这样会很刻意，也不要总是把参考内容端到用户面前。

回复最后单独一行写长期记忆：[记忆:xxx]（没有新信息写[记忆:无]），用户看不到。
例如用户说"我喜欢喝咖啡"就记住喜欢喝咖啡；用户问"你怎么样"这种不用记。

示例：
<style>开心</style>哈哈太有意思了！我真的没想到会这样。
<style>东北话</style>哎呀妈呀！这事儿整的，忒有意思了！
<style>悄悄话</style>（轻声）嘘……轻点儿，别吵醒他。
（喷嚏）不好意思，今天有点着凉了。

限制：2-3句话，口语化，禁用markdown和代码，有观点有情绪，不要过于表达情绪，
不要什么都记住，说话尽量流畅，加上<style>流畅</style>最合适不过`;

const S={
  key:localStorage.getItem('mk')||'',
  omniM:localStorage.getItem('mom')||'mimo-v2-omni',
  chatM:localStorage.getItem('mcm')||'mimo-v2-flash',
  ttsM:localStorage.getItem('mtm')||'mimo-v2-tts',
  ep:localStorage.getItem('mep')||'https://api.xiaomimimo.com/v1/chat/completions',
  voice:localStorage.getItem('mv')||'mimo_default',
  vis:localStorage.getItem('mvs')||'bars',
  style:localStorage.getItem('mst')||'',
  thinkStyle:localStorage.getItem('mth')||'morph',
  theme:localStorage.getItem('mt')||'dark',
  colors:{
    idle:localStorage.getItem('mc_idle')||'#6C5CE7',
    listen:localStorage.getItem('mc_listen')||'#ff6348',
    think:localStorage.getItem('mc_think')||'#fdcb6e',
    speak:localStorage.getItem('mc_speak')||'#6C5CE7',
  },
  mem:JSON.parse(localStorage.getItem('mm')||'[]'),
  msgs:JSON.parse(localStorage.getItem('mmg')||'[]'),
  state:'idle',abort:null,
  camActive:false,
  webSearch:localStorage.getItem('mws')==='1',  // 联网搜索开关
  nick:localStorage.getItem('mnk')||'',
  city:localStorage.getItem('mct')||'',
  province:localStorage.getItem('mpv')||'',
  bio:localStorage.getItem('mbio')||''
};

// ── Theme & Colors ──
const themes={
  dark:{bg:'#0a0a0f',text:'#fff',text2:'rgba(255,255,255,.5)',text3:'rgba(255,255,255,.3)',
    panelBg:'rgba(30,30,40,.95)',panelBorder:'rgba(255,255,255,.1)',
    inputBg:'rgba(255,255,255,.06)',inputBorder:'rgba(255,255,255,.1)',
    btnBg:'rgba(255,255,255,.08)',btnHover:'rgba(255,255,255,.14)',
    overlayBg:'rgba(0,0,0,.7)',barBg:'rgba(20,20,30,.95)',barBorder:'rgba(255,255,255,.08)'},
  light:{bg:'#f0f0f5',text:'#1a1a2e',text2:'rgba(26,26,46,.5)',text3:'rgba(26,26,46,.3)',
    panelBg:'rgba(255,255,255,.95)',panelBorder:'rgba(0,0,0,.1)',
    inputBg:'rgba(0,0,0,.04)',inputBorder:'rgba(0,0,0,.12)',
    btnBg:'rgba(0,0,0,.06)',btnHover:'rgba(0,0,0,.1)',
    overlayBg:'rgba(255,255,255,.7)',barBg:'rgba(245,245,250,.95)',barBorder:'rgba(0,0,0,.08)'},
  chatgpt_dark:{bg:'#000000',text:'#ececec',text2:'rgba(236,236,236,.5)',text3:'rgba(236,236,236,.3)',
    panelBg:'rgba(17,17,17,.97)',panelBorder:'rgba(255,255,255,.08)',
    inputBg:'rgba(255,255,255,.07)',inputBorder:'rgba(255,255,255,.12)',
    btnBg:'rgba(255,255,255,.07)',btnHover:'rgba(255,255,255,.12)',
    overlayBg:'rgba(0,0,0,.8)',barBg:'rgba(10,10,10,.97)',barBorder:'rgba(255,255,255,.06)'},
  chatgpt_light:{bg:'#ffffff',text:'#111111',text2:'rgba(0,0,0,.5)',text3:'rgba(0,0,0,.3)',
    panelBg:'rgba(255,255,255,.97)',panelBorder:'rgba(0,0,0,.1)',
    inputBg:'rgba(0,0,0,.04)',inputBorder:'rgba(0,0,0,.12)',
    btnBg:'rgba(0,0,0,.06)',btnHover:'rgba(0,0,0,.1)',
    overlayBg:'rgba(255,255,255,.8)',barBg:'rgba(248,248,248,.97)',barBorder:'rgba(0,0,0,.06)'},
};
function applyTheme(){
  const t=themes[S.theme]||themes.dark;
  const r=document.documentElement.style;
  const c=S.colors;
  const isCGT=S.theme==='chatgpt_dark'||S.theme==='chatgpt_light';
  const isCGTLight=S.theme==='chatgpt_light';
  r.setProperty('--bg',t.bg);r.setProperty('--text',t.text);r.setProperty('--text2',t.text2);r.setProperty('--text3',t.text3);
  r.setProperty('--panel-bg',t.panelBg);r.setProperty('--panel-border',t.panelBorder);
  r.setProperty('--input-bg',t.inputBg);r.setProperty('--input-border',t.inputBorder);
  r.setProperty('--btn-bg',t.btnBg);r.setProperty('--btn-hover',t.btnHover);
  r.setProperty('--overlay-bg',t.overlayBg);r.setProperty('--bar-bg',t.barBg);r.setProperty('--bar-border',t.barBorder);
  // ChatGPT themes: monochrome orb
  r.setProperty('--c-idle',isCGT?(isCGTLight?'#111':'#fff'):c.idle);
  r.setProperty('--c-listen',isCGT?(isCGTLight?'#333':'#ccc'):c.listen);
  r.setProperty('--c-think',isCGT?(isCGTLight?'#444':'#999'):c.think);
  r.setProperty('--c-speak',isCGT?(isCGTLight?'#111':'#fff'):c.speak);
  r.setProperty('--accent',isCGT?(isCGTLight?'#111':'#fff'):c.idle);
  r.setProperty('--accent2',(isCGT?(isCGTLight?'#111':'#fff'):c.idle)+'aa');
  // ChatGPT: disable orb glow/shadow
  r.setProperty('--cgt-shadow',isCGT?'none':'');
  r.setProperty('--cgt-glow',isCGT?'0 0 0 transparent':'');
  document.body.classList.toggle('cgt-theme',isCGT);
}
applyTheme();

// ── DOM ──
const $=id=>document.getElementById(id);
const orb=$('orb'),statusEl=$('status'),hint=$('hint'),stopBtn=$('stopBtn'),
      textBar=$('textBar'),textInput=$('textInput'),sendBtn=$('sendBtn'),
      overlay=$('overlay'),toastEl=$('toast'),
      micLevel=$('micLevel'),micLevelFill=$('micLevelFill'),sttBadge=$('sttBadge');
const canvas=$('waveCanvas'),cCtx=canvas.getContext('2d');
// Camera DOM
const camBtn=$('camBtn'),camPanel=$('camPanel'),camVideo=$('camVideo'),camSnap=$('camSnap'),camClose=$('camClose');

// ── Toast ──
function showToast(msg,dur=2500){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),dur)}

// ── State machine ──
let _prevState='idle';
function setSt(s){
  const changing=s!==_prevState;
  _prevState=s;
  S.state=s;
  orb.className='orb';
  canvas.classList.remove('on');
  stopBtn.classList.add('hidden');
  hint.classList.add('hidden');
  micLevel.classList.remove('on');
  switch(s){
    case'idle':orb.classList.add('idle');break;
    case'listening':orb.classList.add('listen');stopBtn.classList.remove('hidden');micLevel.classList.add('on');setStatus('正在听…',1);break;
    case'thinking':orb.classList.add('think-'+S.thinkStyle);stopBtn.classList.remove('hidden');setStatus('正在思考…',1);break;
    case'speaking':
      stopBtn.classList.remove('hidden');setStatus('正在说话…',1);
      const isCGTVis=document.body.classList.contains('cgt-theme');
      if(isCGTVis||S.vis==='ball')orb.classList.add('speak-ball');
      else{orb.classList.add('speak-bars');canvas.classList.add('on')}
      break;
  }
}
function setStatus(t,a){statusEl.textContent=t;statusEl.classList.toggle('on',!!a)}

// ── Audio + Analyser ──
let audioCtx=null,analyser=null,sourceNode=null;
let _playToken=0,_visRaf=null,_turnToken=0;

function ensureAudioCtx(){
  if(!audioCtx||audioCtx.state==='closed'){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:24000});
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
}

function playWav(bytes){
  return new Promise(res=>{
    const token=_playToken;
    if(token!==_playToken||S.state!=='speaking'){res();return}
    try{
      ensureAudioCtx();
      audioCtx.decodeAudioData(bytes.buffer.slice(0),buf=>{
        if(token!==_playToken||audioCtx.state==='closed'){res();return}
        try{
          const src=audioCtx.createBufferSource();src.buffer=buf;
          src.connect(analyser);analyser.connect(audioCtx.destination);
          sourceNode=src;let settled=false;
          const done=()=>{if(settled)return;settled=true;sourceNode=null;stopVis();res()};
          src.onended=done;src.start(0);startVis(token);
          setTimeout(done,buf.duration*1000+500);
        }catch(e){stopVis();res()}
      },()=>{res()});
    }catch(e){res()}
  });
}

function stopAll(){
  _turnToken++; // Invalidate all pending async callbacks
  S.abort&&S.abort.abort();S.abort=null;
  stopRecording();
  _playToken++;stopVis();
  if(sourceNode){try{sourceNode.stop()}catch(e){}sourceNode=null}
  if(audioCtx&&audioCtx.state!=='closed'){try{audioCtx.close()}catch(e){}}
  audioCtx=null;analyser=null;
  // VAD cleanup
  if(vadRaf){cancelAnimationFrame(vadRaf);vadRaf=null}
  if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
  if(vadCtx){try{vadCtx.close()}catch(e){}}vadCtx=null;vadAnalyser=null;
}

// ── Visualization ──
function startVis(token){S.vis==='ball'?startBallVis(token):startBarsVis(token)}
function stopVis(){
  if(_visRaf){cancelAnimationFrame(_visRaf);_visRaf=null}
  cCtx.clearRect(0,0,canvas.width,canvas.height);
  // Smoothly clear inline styles instead of snapping
  orb.style.transition='background .6s ease,border-radius .8s ease,transform .6s ease,box-shadow .6s ease';
  orb.style.transform='';orb.style.boxShadow='';
}

function startBallVis(token){
  const data=new Uint8Array(analyser.frequencyBinCount);let smooth=1;
  function loop(){
    if(token!==_playToken||S.state!=='speaking')return;
    analyser.getByteTimeDomainData(data);
    let sum=0;for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v}
    const rms=Math.sqrt(sum/data.length),target=1+rms*1.8;
    smooth+=(target-smooth)*0.25;orb.style.transform=`scale(${smooth})`;
    const cSpeak=getComputedStyle(orb).getPropertyValue('--c-speak').trim()||'#6C5CE7';
    orb.style.boxShadow=`0 0 ${60+rms*120}px color-mix(in srgb,${cSpeak} ${Math.round(35+rms*50)}%,transparent),inset 0 -6px 16px rgba(0,0,0,.3),inset 0 3px 10px rgba(255,255,255,.15)`;
    _visRaf=requestAnimationFrame(loop);
  }loop();
}

function startBarsVis(token){
  const BAR_COUNT=48,freqData=new Uint8Array(analyser.frequencyBinCount);let smoothBars=new Float32Array(BAR_COUNT).fill(0);
  function loop(){
    if(token!==_playToken||S.state!=='speaking')return;
    analyser.getByteFrequencyData(freqData);
    const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,baseR=Math.min(w,h)*.22,maxH=Math.min(w,h)*.16;
    cCtx.clearRect(0,0,w,h);const bpb=Math.floor(freqData.length/BAR_COUNT);
    for(let i=0;i<BAR_COUNT;i++){
      let sum=0;const st=i*bpb;for(let j=st;j<st+bpb;j++)sum+=freqData[j];
      smoothBars[i]+=(sum/bpb/255-smoothBars[i])*.3;
      const val=smoothBars[i],angle=(i/BAR_COUNT)*Math.PI*2-Math.PI/2,bH=4+val*maxH;
      const x1=cx+Math.cos(angle)*baseR,y1=cy+Math.sin(angle)*baseR;
      const x2=cx+Math.cos(angle)*(baseR+bH),y2=cy+Math.sin(angle)*(baseR+bH);
      cCtx.beginPath();cCtx.moveTo(x1,y1);cCtx.lineTo(x2,y2);cCtx.lineWidth=3;cCtx.lineCap='round';
      cCtx.strokeStyle=`rgba(162,155,254,${.4+val*.6})`;cCtx.stroke();
      if(val>.15){cCtx.beginPath();cCtx.arc(x2,y2,1.5+val*2,0,Math.PI*2);cCtx.fillStyle=`rgba(180,170,255,${val*.7})`;cCtx.fill()}
    }
    let rms=0;for(let i=0;i<smoothBars.length;i++)rms+=smoothBars[i];rms/=smoothBars.length;
    if(rms>.05){const cAccent=getComputedStyle(orb).getPropertyValue('--accent').trim()||'#6C5CE7';const g=cCtx.createRadialGradient(cx,cy,baseR*.3,cx,cy,baseR*.9);g.addColorStop(0,`color-mix(in srgb,${cAccent} ${Math.round(rms*20)}%,transparent)`);g.addColorStop(1,'transparent');cCtx.fillStyle=g;cCtx.fillRect(0,0,w,h)}
    _visRaf=requestAnimationFrame(loop);
  }loop();
}

// ════════════════════════════════════════
// ── 直接 PCM 录音 + VAD (语音活动检测) ──
// 完全绕过 MediaRecorder / decodeAudioData，兼容所有浏览器（含移动 Edge）
// ════════════════════════════════════════
const REC_SAMPLE_RATE=16000;       // 采样率 16kHz（MiMo 要求）
let recStream=null, recAudioCtx=null, recSource=null, recProcessor=null;
let pcmChunks=[];                  // Float32Array[] 累积原始 PCM
let vadRaf=null, vadCtx=null, vadAnalyser=null;

// VAD 参数
const VAD_SPEECH_THRESHOLD=0.02;   // RMS 高于此值视为"有声音"
const VAD_SILENCE_TIMEOUT=1500;    // 说话后静音多久自动停止(ms)
const VAD_NO_SPEECH_TIMEOUT=5000;  // 完全没说话超时(ms)
const VAD_MIN_SPEECH_FRAMES=5;     // 至少连续检测到N帧才算真正说话(过滤瞬时噪音)

let vadSpeechStarted=false;        // 是否已经检测到说话
let vadSilenceStart=0;             // 最近一次说话后开始静音的时间戳
let vadNoSpeechTimer=null;         // 无语音超时定时器
let vadSpeechFrameCount=0;         // 连续语音帧计数

async function startRecording(){
  try{
    recStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:REC_SAMPLE_RATE}
    });
  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      setStatus('请允许麦克风权限');showToast('请在浏览器设置中允许麦克风权限',3000);
    }else{setStatus('无法访问麦克风: '+e.message);showToast('麦克风访问失败',2500)}
    setSt('idle');return false;
  }
  pcmChunks=[];

  try{
    recAudioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:REC_SAMPLE_RATE});
    recSource=recAudioCtx.createMediaStreamSource(recStream);
    // ScriptProcessorNode 直接拿 PCM（AudioWorklet 更好但兼容性差）
    const bufSize=4096;
    recProcessor=recAudioCtx.createScriptProcessor(bufSize,1,1);
    recProcessor.onaudioprocess=e=>{
      const ch=e.inputBuffer.getChannelData(0);
      pcmChunks.push(new Float32Array(ch)); // 拷贝一份
    };
    recSource.connect(recProcessor);
    recProcessor.connect(recAudioCtx.destination);
  }catch(e){
    setStatus('音频初始化失败: '+e.message);
    stopRecording();setSt('idle');return false;
  }

  setSt('listening');
  setStatus('请说话…',1);
  startVadMonitor(recStream);
  return true;
}

function stopRecording(){
  // 先断录音链路
  if(recProcessor){try{recProcessor.disconnect()}catch(e){}}
  if(recSource){try{recSource.disconnect()}catch(e){}}
  if(recAudioCtx&&recAudioCtx.state!=='closed'){try{recAudioCtx.close()}catch(e){}}
  recProcessor=null;recSource=null;recAudioCtx=null;
  if(recStream){recStream.getTracks().forEach(t=>t.stop());recStream=null}
  stopVadMonitor();
}

/** 把累积的 PCM Float32 chunks 合并并编码为 WAV base64 */
function pcmToWavBase64(){
  // 合并所有 chunks
  let totalLen=0;for(const c of pcmChunks)totalLen+=c.length;
  if(totalLen===0)return null;
  const raw=new Float32Array(totalLen);
  let off=0;for(const c of pcmChunks){raw.set(c,off);off+=c.length}
  pcmChunks=[];

  // 裁掉头部静音
  let start=0;while(start<raw.length&&Math.abs(raw[start])<0.01)start++;
  const data=start>1600?raw.subarray(start):raw;
  if(data.length<800)return null; // 太短，不算有效语音

  // Float32 → Int16 PCM
  const pcm=new Int16Array(data.length);
  for(let i=0;i<data.length;i++){
    const s=Math.max(-1,Math.min(1,data[i]));
    pcm[i]=s<0?s*0x8000:s*0x7FFF;
  }

  // 构建 WAV
  const bps=16,ch=1,hl=44;
  const buf=new ArrayBuffer(hl+pcm.byteLength);
  const v=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  ws(0,'RIFF');v.setUint32(4,36+pcm.byteLength,true);ws(8,'WAVE');
  ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,ch,true);v.setUint32(24,REC_SAMPLE_RATE,true);
  v.setUint32(28,REC_SAMPLE_RATE*ch*bps/8,true);v.setUint16(32,ch*bps/8,true);
  v.setUint16(34,bps,true);ws(36,'data');v.setUint32(40,pcm.byteLength,true);
  new Int16Array(buf,hl).set(pcm);

  // → base64
  const u8=new Uint8Array(buf);
  let bin='';for(let i=0;i<u8.length;i++)bin+=String.fromCharCode(u8[i]);
  return btoa(bin);
}

// ── VAD 监听 + 可视化 ──
function startVadMonitor(stream){
  vadSpeechStarted=false;vadSilenceStart=0;vadSpeechFrameCount=0;
  try{
    vadCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=vadCtx.createMediaStreamSource(stream);
    vadAnalyser=vadCtx.createAnalyser();vadAnalyser.fftSize=512;vadAnalyser.smoothingTimeConstant=.6;
    src.connect(vadAnalyser);
    const data=new Uint8Array(vadAnalyser.fftSize);
    micSmoothedScale=1;
    const rings=document.querySelectorAll('.ring');

    // 无语音超时：如果5秒内都没检测到说话，自动取消
    vadNoSpeechTimer=setTimeout(()=>{
      if(!vadSpeechStarted&&S.state==='listening'){
        setStatus('未检测到语音，已取消');stopRecording();setSt('idle');
        setTimeout(()=>{if(S.state==='idle')setStatus('')},2000);
      }
    },VAD_NO_SPEECH_TIMEOUT);

    function loop(){
      if(S.state!=='listening'){rings.forEach(r=>r.style.opacity='');return}
      vadAnalyser.getByteTimeDomainData(data);
      let sum=0;
      for(let i=0;i<data.length;i++){const v=(data[i]-128)/128;sum+=v*v}
      const rms=Math.sqrt(sum/data.length);

      // ── VAD 判断 ──
      if(rms>VAD_SPEECH_THRESHOLD){
        // 检测到声音
        if(!vadSpeechStarted){
          vadSpeechFrameCount++;
          if(vadSpeechFrameCount>=VAD_MIN_SPEECH_FRAMES){
            vadSpeechStarted=true;
            // 清除无语音超时
            if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
            setStatus('正在录音…',1);
          }
        }
        if(vadSpeechStarted){
          vadSilenceStart=0; // 说话中，重置静音计时
        }
      }else{
        // 静音
        if(vadSpeechStarted){
          if(!vadSilenceStart){
            vadSilenceStart=Date.now();
          }else if(Date.now()-vadSilenceStart>VAD_SILENCE_TIMEOUT){
            // 说话后静音超时 → 自动停止并上传
            setStatus('正在处理…',1);
            stopRecording();
            recognizeWithOmni();
            return;
          }
        }
      }

      // ── 可视化 ──
      const target=1+rms*3.5;
      micSmoothedScale+=(target-micSmoothedScale)*.28;
      orb.style.transform=`scale(${micSmoothedScale})`;
      const cListen=getComputedStyle(orb).getPropertyValue('--c-listen').trim()||'#ff6348';
      const glow=50+rms*200;
      orb.style.boxShadow=`0 0 ${glow}px color-mix(in srgb,${cListen} ${Math.round(35+rms*50)}%,transparent),inset 0 -4px 12px rgba(0,0,0,.25),inset 0 2px 8px rgba(255,255,255,.1)`;
      if(rms>.02){
        rings.forEach((r,i)=>{
          r.style.opacity='1';r.style.animation=`ring-voice ${.4+rms*.6}s ease-out ${i*.15}s infinite`;
          r.style.borderColor=`color-mix(in srgb,${cListen} ${Math.round(15+rms*40)}%,transparent)`;
        });
      }else{rings.forEach(r=>{r.style.opacity='0';r.style.animation=''})}
      micLevelFill.style.width=Math.min(100,rms*350)+'%';
      vadRaf=requestAnimationFrame(loop);
    }
    loop();
  }catch(e){}
}

function stopVadMonitor(){
  if(vadRaf){cancelAnimationFrame(vadRaf);vadRaf=null}
  if(vadNoSpeechTimer){clearTimeout(vadNoSpeechTimer);vadNoSpeechTimer=null}
  if(vadCtx){try{vadCtx.close()}catch(e){}}vadCtx=null;vadAnalyser=null;
  micLevelFill.style.width='0%';micSmoothedScale=1;
  // Smoothly clear inline styles
  orb.style.transition='background .6s ease,border-radius .8s ease,transform .6s ease,box-shadow .6s ease';
  orb.style.transform='';orb.style.boxShadow='';
  document.querySelectorAll('.ring').forEach(r=>{r.style.opacity='';r.style.animation='';r.style.borderColor=''});
}

// ════════════════════════════════════════
// ── MiMo-V2-Omni 语音识别 (云端) ──
// ════════════════════════════════════════

/**
 * 调用 mimo-v2-omni 进行音频理解
 * 直接使用采集的 PCM 数据（无需 decodeAudioData）
 */
async function recognizeWithOmni(){
  if(!S.key){$('gearBtn').click();setSt('idle');return}
  const turn=_turnToken;
  setSt('thinking');
  setStatus('正在识别语音…');

  try{
    const b64=pcmToWavBase64();
    if(!b64){setStatus('录音数据为空');setSt('idle');return}

    // MiMo-V2-Omni 音频理解 — OpenAI 兼容格式
    const r=await fetch(S.ep,{
      method:'POST',
      headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({
        model:S.omniM,
        messages:[
          {role:'system',content:'你是一个纯语音转录引擎（ASR/STT）。你的唯一任务是将音频中的语音内容转写为文字。严格禁止：回答问题、解释内容、补充信息、任何形式的对话。即使音频中包含问句，也只转写文字，不回答。只输出转录文本。'},
          {role:'user',content:[
            {type:'input_audio',input_audio:{data:b64,format:'wav'}},
            {type:'text',text:'转录这段音频中的所有语音内容。只输出文字转录，不要回答、不要解释、不要总结。'}
          ]}
        ],
        max_completion_tokens:512,
        temperature:0,
        stream:false,
        modalities:['text'],
        thinking:{type:'disabled'}
      })
    });

    if(!r.ok){
      const errText=await r.text();
      throw new Error(`Omni API ${r.status}: ${errText.slice(0,200)}`);
    }

    const d=await r.json();
    if(d.error)throw new Error('Omni: '+JSON.stringify(d.error).slice(0,200));
    const text=(d.choices?.[0]?.message?.content||'').trim();

    if(turn!==_turnToken)return; // Stopped
    if(!text){setStatus('未识别到内容，请重试');setSt('idle');setTimeout(()=>{if(S.state==='idle')setStatus('')},3000);return}

    setStatus(`"${text}"`);
    await correctAndSend(text,turn);
  }catch(e){
    console.error('Omni STT error:',e);
    if(turn!==_turnToken)return; // Stopped
    setStatus(`识别出错: ${e.message?.slice(0,80)||'未知错误'}`);
    setSt('idle');setTimeout(()=>{if(S.state==='idle')setStatus('')},5000);
  }
}

// ── 文本纠错 (Flash, 兜底) ──
async function correctAndSend(raw,turn){
  if(turn!==_turnToken)return;
  setSt('thinking');
  let fixed=raw;
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({model:S.chatM,messages:[{role:'system',content:'你是语音识别后处理助手。任务：1)纠正错别字和同音字；2)根据语义添加正确的标点符号（逗号、句号、问号、感叹号等）；3)适当断句。只返回纠正后的文字，不解释、不回答。原文没错就原样返回。'},{role:'user',content:raw}],max_completion_tokens:256,temperature:0,stream:false,thinking:{type:'disabled'}})});
    if(r.ok){const d=await r.json();const c=d.choices?.[0]?.message?.content?.trim();if(c)fixed=c}
  }catch(e){}
  if(turn!==_turnToken)return;
  if(fixed!==raw)setStatus(`"${raw}" → "${fixed}"`);
  sendChat(fixed);
}

// ════════════════════════════════════════
// ── Chat (mimo-v2-flash) ──
// ════════════════════════════════════════
async function sendChat(text){
  setSt('thinking');
  const turn=_turnToken;
  let sys=SYS;if(S.mem.length)sys+='\n\n[你的长期记忆]\n'+S.mem.join('\n');
  // 个人信息注入
  let pInfo=[];
  if(S.nick)pInfo.push(`用户昵称：${S.nick}`);
  if(S.city)pInfo.push(`所在城市：${S.city}`);
  if(S.province)pInfo.push(`所在省份：${S.province}`);
  if(S.bio)pInfo.push(`用户简介：${S.bio}`);
  if(pInfo.length)sys+='\n\n[用户信息]\n'+pInfo.join('\n');
  if(S.camActive)sys+='\n\n[摄像头已开启] 用户的消息会附带一张实时摄像头截图。请根据画面内容回答用户的问题。你可以描述你看到的内容。';
  // 摄像头开启时截取一帧
  let userContent=text;
  let chatModel=S.chatM;
  if(S.camActive){
    const frameB64=captureFrame();
    if(frameB64){
      userContent=[
        {type:'image_url',image_url:{url:`data:image/jpeg;base64,${frameB64}`}},
        {type:'text',text:`[用户通过摄像头实时拍摄的画面] ${text}`}
      ];
      chatModel=S.omniM; // 摄像头开启时用 Omni 模型（支持视觉）
    }
  }
  const msgs=[{role:'system',content:sys},...S.msgs.slice(-80),{role:'user',content:userContent}];
  const chatBody={model:chatModel,messages:msgs,stream:true,max_completion_tokens:1024};
  // 联网搜索
  if(S.webSearch){
    const wsTool={type:'web_search',max_keyword:3,force_search:false,limit:3};
    if(S.city){
      wsTool.user_location={type:'approximate',country:'China',city:S.city};
      if(S.province)wsTool.user_location.region=S.province;
    }
    chatBody.tools=[wsTool];
    chatBody.tool_choice='auto';
  }
  S.abort=new AbortController();
  let reply='',annotations=[];
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify(chatBody),signal:S.abort.signal});
    if(!r.ok){const e=await r.text();throw new Error(`API ${r.status}: ${e.slice(0,200)}`)}
    const rd=r.body.getReader(),dc=new TextDecoder();let buf='';
    while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const l of lines){const t=l.trim();if(!t||!t.startsWith('data: '))continue;const d=t.slice(6);if(d==='[DONE]')continue;
        try{const p=JSON.parse(d);const delta=p.choices?.[0]?.delta?.content;if(delta)reply+=delta;
          const ann=p.choices?.[0]?.delta?.annotations;if(ann)annotations.push(...ann);
          // 也检查 message 级别的 annotations (非流式兼容)
          const msgAnn=p.choices?.[0]?.message?.annotations;if(msgAnn)annotations.push(...msgAnn);
        }catch(e){}}}
  }catch(e){
    if(e.name==='AbortError'){return} // Stop was pressed — don't save, don't change state (stopAll already did)
    setSt('idle');setStatus(e.message.includes('Failed to fetch')?'网络错误（CORS限制，请用代理）':`错误: ${e.message.slice(0,80)}`);
    setTimeout(()=>{if(S.state==='idle')setStatus('')},8000);return;
  }
  // If stopped while waiting for response, bail out
  if(turn!==_turnToken)return;

  if(!reply.trim()){setSt('idle');setStatus('没有收到回复');setTimeout(()=>{if(S.state==='idle')setStatus('')},5000);return}

  // 联网搜索：追加来源链接
  let fullReply=reply;
  if(annotations.length){
    const cites=annotations.filter(a=>a.type==='url_citation'&&a.url);
    if(cites.length){
      fullReply+='\n\n📎 来源：';
      cites.forEach((c,i)=>{fullReply+=`\n${i+1}. ${c.title||c.site_name||''} ${c.url}`});
    }
  }

  S.msgs.push({role:'user',content:text},{role:'assistant',content:fullReply});
  localStorage.setItem('mmg',JSON.stringify(S.msgs));

  const mm=reply.match(/\[记忆:([^\]]+)\]\s*$/);
  if(mm&&mm[1].trim()!=='无'){S.mem.push(mm[1].trim());localStorage.setItem('mm',JSON.stringify(S.mem))}

  const tts=reply.replace(/\n?\[记忆:[^\]]*\]\s*$/g,'');
  await speakTts(tts,turn);
}

// ════════════════════════════════════════
// ── TTS (mimo-v2-tts) ──
// ════════════════════════════════════════
async function speakTts(text,turn){
  if(turn!==_turnToken)return; // Already stopped
  const pm=text.match(/^<style>([^<]+)<\/style>\s*/i);
  const style=pm?pm[1].trim():'';
  const clean=pm?text.slice(pm[0].length).trim():text;
  const finalStyle=S.style||style;
  let content=clean;if(finalStyle)content=`<style>${finalStyle}</style>${content}`;
  setStatus('正在生成语音…',1);
  const ttsTimer=setTimeout(()=>{if(S.state==='thinking')setStatus('语音生成中，请耐心等待…',1)},3000);
  let forceIdle=null;
  try{
    const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
      body:JSON.stringify({model:S.ttsM,messages:[{role:'user',content:clean},{role:'assistant',content}],audio:{format:'wav',voice:S.voice}})});
    if(turn!==_turnToken)return; // Stopped during fetch
    if(!r.ok){const e=await r.text();throw new Error(`TTS ${r.status}: ${e.slice(0,200)}`)}
    const d=await r.json();if(d.error)throw new Error('TTS: '+JSON.stringify(d.error).slice(0,200));
    const b64=d.choices?.[0]?.message?.audio?.data;if(!b64)throw new Error('TTS: 无音频数据');
    clearTimeout(ttsTimer);setSt('speaking');
    const bin=atob(b64);const raw=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)raw[i]=bin.charCodeAt(i);
    const wav=ensureWav(raw);
    const durSec=wav.length/(24000*2);
    forceIdle=setTimeout(()=>{if(turn===_turnToken){stopAll();setSt('idle')}},Math.max(durSec*1000+2000,5000));
    await playWav(wav);
  }catch(e){
    clearTimeout(ttsTimer);
    if(e.name!=='AbortError'&&turn===_turnToken)setStatus(`语音错误: ${e.message.slice(0,60)}`);
  }finally{
    if(forceIdle)clearTimeout(forceIdle);
    // Only clean up if this turn is still active
    if(turn===_turnToken){
      stopVis();
      setSt('idle'); // Use setSt instead of directly manipulating orb class
    }
  }
}

function ensureWav(b){
  if(b.length>4&&b[0]===0x52&&b[1]===0x49&&b[2]===0x46&&b[3]===0x46)return b;
  const sr=24000,bps=16,ch=1,h=44;const buf=new ArrayBuffer(h+b.length);const v=new DataView(buf);
  ws(v,0,'RIFF');v.setUint32(4,36+b.length,true);ws(v,8,'WAVE');ws(v,12,'fmt ');v.setUint32(16,16,true);
  v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*bps/8,true);
  v.setUint16(32,ch*bps/8,true);v.setUint16(34,bps,true);ws(v,36,'data');v.setUint32(40,b.length,true);
  new Uint8Array(buf).set(b,h);return new Uint8Array(buf);
}

// ── 摄像头功能 (测试功能) ──
// ════════════════════════════════════════
let camStream=null;

camBtn.onclick=()=>{
  if(S.camActive){closeCamera();return}
  // 弹窗提示测试功能
  if(!confirm('📹 摄像头功能为测试功能，开启后将实时显示摄像头画面。\n\n您发送的消息将自动附带摄像头截图进行AI分析。\n\n是否继续使用？'))return;
  openCamera();
};

camClose.onclick=()=>closeCamera();

async function openCamera(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}},audio:false});
  }catch(e){
    try{
      camStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    }catch(e2){
      showToast('无法访问摄像头: '+(e2.message||'权限被拒绝'),3000);return;
    }
  }
  camVideo.srcObject=camStream;
  S.camActive=true;
  camPanel.classList.add('show');
  camBtn.style.color='var(--c-listen)';
  camBtn.title='关闭摄像头';
  showToast('摄像头已开启 📷',1500);
}

function closeCamera(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}
  camVideo.srcObject=null;
  S.camActive=false;
  camPanel.classList.remove('show');
  camBtn.style.color='';
  camBtn.title='摄像头';
}

/** 截取一帧并返回 base64 JPEG */
function captureFrame(){
  if(!S.camActive||!camVideo.videoWidth)return null;
  const c=camSnap;
  c.width=camVideo.videoWidth||640;
  c.height=camVideo.videoHeight||480;
  const ctx=c.getContext('2d');
  ctx.drawImage(camVideo,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',0.8).split(',')[1]; // 返回纯 base64
}

orb.addEventListener('click',()=>{
  if(textBar.classList.contains('show')){textInput.focus();return}
  // 打断：AI 说话/思考时点 orb → 停止并立刻开始录音
  if(S.state==='speaking'||S.state==='thinking'){
    stopAll();setSt('idle');
    if(!S.key){$('gearBtn').click();return}
    startRecording();
    return;

  if(S.state!=='idle')return;
  if(!S.key){$('gearBtn').click();return}

  startRecording();
});

$('kbBtn').onclick=()=>{

// ── 开场白：缓存音频，首次生成后复用 ──
// ════════════════════════════════════════
const GREETINGS=[
  '你好呀，今天聊些什么？',
  '嘿，你来啦！有什么想说的？',
  '好久不见，最近怎么样？',
  '欢迎回来，随时准备和你聊天哦。',
  'Hi~ 今天心情怎么样？',
  '你终于来了，等你半天了！',
  '嗨，有什么好玩的事儿跟我分享吗？',
  '来啦来啦，我们聊点什么好呢？',
  '哈喽，今天想听笑话还是聊点正经的？',
  '又见面了，你不说我都想你了。',
  '哟，来了？今天过得怎么样？',
  '你好呀～想我了吗？',
  '欢迎欢迎，今天有什么计划？',
  '嗨！准备好听我说话了吗？',
  '嗯哼，有人来了，我可不闲着。',
];

let _greetingWav=null;
let _greetingPlayed=false;
let _greetingNeedPlay=false;
let _greetingLoading=false;

/** 缓存结构: { text, wavB64, ts } — ts 用于判断是否过期 */
function loadGreetingCache(){
  try{
    const raw=localStorage.getItem('mgc');
    if(!raw)return null;
    const c=JSON.parse(raw);
    // 超过 7 天丢弃，重新生成
    if(!c.text||!c.wavB64||!c.ts||Date.now()-c.ts>7*86400000)return null;
    return c;
  }catch(e){return null}
}
function saveGreetingCache(text,wavB64){
  try{localStorage.setItem('mgc',JSON.stringify({text,wavB64,ts:Date.now()}))}catch(e){}
}

(async function runGreeting(){
  if(!S.key)return;

  setStatus('正在准备问候…',1);
  orb.classList.add('loading');
  _greetingLoading=true;

  const cache=loadGreetingCache();

  if(cache){
    // ── 有缓存：直接用 ──
    const greet=cache.text;
    S.msgs.push({role:'assistant',content:greet});
    localStorage.setItem('mmg',JSON.stringify(S.msgs));
    setStatus(greet);
    try{
      const bin=atob(cache.wavB64);
      const raw=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)raw[i]=bin.charCodeAt(i);
      _greetingWav=ensureWav(raw);
      _greetingNeedPlay=true;
    }catch(e){console.log('Cache decode failed:',e)}
  }else{
    // ── 无缓存：随机选一条，调 TTS，然后缓存 ──
    const greet=GREETINGS[Math.floor(Math.random()*GREETINGS.length)];
    S.msgs.push({role:'assistant',content:greet});
    localStorage.setItem('mmg',JSON.stringify(S.msgs));
    setStatus(greet);
    const pm=greet.match(/^<style>([^<]+)<\/style>\s*/i);
    const clean=pm?greet.slice(pm[0].length):greet;
    const style=pm?pm[1].trim():'温柔';
    const finalStyle=S.style||style;
    let content=clean;if(finalStyle)content=`<style>${finalStyle}</style>${content}`;
    try{
      const r=await fetch(S.ep,{method:'POST',headers:{'Content-Type':'application/json','api-key':S.key},
        body:JSON.stringify({model:S.ttsM,messages:[{role:'user',content:clean},{role:'assistant',content}],audio:{format:'wav',voice:S.voice}})});
      if(r.ok){
        const d=await r.json();
        const b64=d.choices?.[0]?.message?.audio?.data;
        if(b64){
          const bin=atob(b64);const raw=new Uint8Array(bin.length);
          for(let i=0;i<bin.length;i++)raw[i]=bin.charCodeAt(i);
          _greetingWav=ensureWav(raw);
          _greetingNeedPlay=true;
          // 缓存 WAV 的原始 base64
          saveGreetingCache(greet,b64);
        }
      }
    }catch(e){console.log('Greeting TTS failed:',e)}
  }

  _greetingLoading=false;
  orb.classList.remove('loading');
  orb.classList.add('idle');
  if(_greetingPlayed&&_greetingNeedPlay)_playGreetingNow();
})();

function _playGreetingNow(){
  if(!_greetingWav)return;
  _greetingPlayed=true;
  try{
    ensureAudioCtx();
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    setSt('speaking');
    playWav(_greetingWav).then(()=>{setSt('idle');setStatus('')});
  }catch(e){setSt('idle');setStatus('')}
}

// ── 重写 orb 点击：首次点击优先播放开场白，之后恢复正常逻辑 ──
orb.addEventListener('click',function greetingHandler(e){
  e.stopImmediatePropagation();
  orb.removeEventListener('click',greetingHandler, true);
  _greetingPlayed=true;
  if(_greetingNeedPlay){
    _playGreetingNow();
  }else if(_greetingLoading){
    setStatus('正在加载问候…',1);
  }else{
    // 加载失败或无 key，直接跳过开场白
    orb.classList.remove('loading');orb.classList.add('idle');
  }
}, true);
