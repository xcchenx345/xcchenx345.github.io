<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF8F5;
            --bg-warm: #F5F1EB;
            --surface: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #FF6900;
            --border: #E8E4DE;
            --shadow: rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            padding: 1.5rem 3rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
        }

        .hero p {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .app-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: block;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .app-card:nth-child(1) { animation-delay: 0.1s; }
        .app-card:nth-child(2) { animation-delay: 0.2s; }
        .app-card:nth-child(3) { animation-delay: 0.3s; }

        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px var(--shadow);
            border-color: transparent;
        }

        .app-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .app-card:hover::after { transform: scaleX(1); }

        .app-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .app-card:nth-child(1) .app-icon {
            background: linear-gradient(135deg, #FFE5D0 0%, #FFD0A8 100%);
            color: var(--accent);
        }

        .app-card:nth-child(2) .app-icon {
            background: linear-gradient(135deg, #E0F4FF 0%, #B8E4FF 100%);
            color: #0088CC;
        }

        .app-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .app-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.25rem;
        }

        .app-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            background: var(--bg-warm);
            color: var(--text-secondary);
        }

        .app-card:nth-child(2) .tag {
            background: #F0F8FF;
            color: #0066AA;
        }

        .app-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--accent);
        }

        .app-card:nth-child(2) .app-action { color: #0088CC; }

        .arrow { transition: transform 0.3s ease; }
        .app-card:hover .arrow { transform: translateX(4px); }

        /* ═══ Voice Ball Card ═══ */
        .voice-card {
            grid-column: 1 / -1;
            padding: 2.5rem;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            border-radius: 20px;
        }

        .voice-card::after {
            background: linear-gradient(90deg, #6C5CE7, #a29bfe);
        }

        .voice-card:hover {
            border-color: transparent;
            box-shadow: 0 16px 48px rgba(108, 92, 231, 0.15);
        }

        .voice-card .app-icon {
            background: linear-gradient(135deg, #E8E0FF 0%, #C8B8FF 100%);
            color: #6C5CE7;
            width: 56px; height: 56px;
            border-radius: 14px;
            font-size: 1.2rem;
        }

        .voice-card .app-title { font-size: 1.35rem; }

        .voice-card .tag {
            background: #F0EAFF;
            color: #6C5CE7;
        }

        .voice-card .app-action { color: #6C5CE7; }

        /* ─── Animated ball decoration ─── */
        .voice-deco {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-ball {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #b8a9ff, #6C5CE7 50%, #3d2ca0);
            box-shadow:
                0 0 30px rgba(108,92,231,0.3),
                0 0 60px rgba(108,92,231,0.12),
                inset 0 -4px 10px rgba(0,0,0,0.2),
                inset 0 2px 6px rgba(255,255,255,0.2);
            z-index: 2;
            position: relative;
            animation: ball-cycle 4s ease-in-out infinite;
        }

        .voice-ball::before {
            content: '🎙️';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }

        /* Ball: visible 0-50%, hidden 50-85%, visible with bounce 85-100% */
        @keyframes ball-cycle {
            0%   { transform: scale(1);   opacity: 1; }
            15%  { transform: scale(1.06); opacity: 1; }
            30%  { transform: scale(1);   opacity: 1; }
            45%  { transform: scale(1);   opacity: 1; }
            50%  { transform: scale(0.8); opacity: 0; }
            80%  { transform: scale(0.8); opacity: 0; }
            85%  { transform: scale(1.18); opacity: 1; }
            92%  { transform: scale(0.92); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* Sound rings — pulse during speaking phase (50-83%) */
        .voice-ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(108,92,231,0.25);
            animation: ring-cycle 4s ease-in-out infinite;
        }
        .voice-ring:nth-child(2) { width: 90px; height: 90px; animation-delay: 0s; }
        .voice-ring:nth-child(3) { width: 108px; height: 108px; animation-delay: 0.15s; }
        .voice-ring:nth-child(4) { width: 120px; height: 120px; animation-delay: 0.3s; }

        @keyframes ring-cycle {
            0%   { opacity: 0; transform: scale(0.7); }
            48%  { opacity: 0; transform: scale(0.7); }
            55%  { opacity: 0.6; transform: scale(0.85); }
            75%  { opacity: 0; transform: scale(1.15); }
            100% { opacity: 0; transform: scale(0.7); }
        }

        /* Mini speaking bars — visible 50-85%, hidden rest */
        .voice-bars {
            position: absolute;
            bottom: 8px;
            display: flex;
            gap: 3px;
            z-index: 3;
            animation: bars-cycle 4s ease-in-out infinite;
        }
        .voice-bar {
            width: 3px;
            border-radius: 2px;
            background: rgba(108,92,231,0.6);
            animation: bar-bounce 0.6s ease-in-out infinite;
        }
        .voice-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
        .voice-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
        .voice-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
        .voice-bar:nth-child(4) { height: 16px; animation-delay: 0.3s; }
        .voice-bar:nth-child(5) { height: 8px;  animation-delay: 0.4s; }

        /* Bars: hidden 0-48%, visible 50-83%, hidden 85-100% */
        @keyframes bars-cycle {
            0%   { opacity: 0; transform: scale(0.6); }
            48%  { opacity: 0; transform: scale(0.6); }
            52%  { opacity: 1; transform: scale(1); }
            78%  { opacity: 1; transform: scale(1); }
            83%  { opacity: 0; transform: scale(0.6); }
            100% { opacity: 0; transform: scale(0.6); }
        }

        @keyframes bar-bounce {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 4rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header { padding: 1rem 1.5rem; }
            .main { padding: 3rem 1.5rem; }
            .hero h1 { font-size: 1.75rem; }
            .apps-grid { grid-template-columns: 1fr; }

            .voice-card {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
                padding: 2rem;
            }
            .voice-card .app-tags { justify-content: center; }
            .voice-card .app-action { justify-content: center; }
            .voice-deco { width: 100px; height: 100px; }
            .voice-ball { width: 60px; height: 60px; }
            .voice-ball::before { font-size: 18px; }
            .voice-ring:nth-child(2) { width: 76px; height: 76px; }
            .voice-ring:nth-child(3) { width: 90px; height: 90px; }
            .voice-ring:nth-child(4) { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">应用中心</div>
    </header>

    <main class="main">
        <section class="hero">
            <h1>探索应用</h1>
            <p>体验智能交互能力</p>
        </section>

        <div class="apps-grid">
            <!-- Voice Ball - featured -->
            <a href="voice-ball.html" class="app-card voice-card">
                <div class="voice-deco">
                    <div class="voice-ring"></div>
                    <div class="voice-ring"></div>
                    <div class="voice-ring"></div>
                    <div class="voice-ball"></div>
                    <div class="voice-bars">
                        <div class="voice-bar"></div>
                        <div class="voice-bar"></div>
                        <div class="voice-bar"></div>
                        <div class="voice-bar"></div>
                        <div class="voice-bar"></div>
                    </div>
                </div>
                <div>
                    <div class="app-icon">🎙️</div>
                    <h2 class="app-title">MiMo 语音对话</h2>
                    <p class="app-desc">
                        点击圆球开始语音对话。MiMo-V2-Flash 智能应答 + MiMo-V2-TTS 真人级语音合成，支持情绪、方言、副语言，让 AI 有温度地说话。
                    </p>
                    <div class="app-tags">
                        <span class="tag">语音对话</span>
                        <span class="tag">情感合成</span>
                        <span class="tag">方言支持</span>
                        <span class="tag">长期记忆</span>
                    </div>
                    <div class="app-action">
                        开始对话 <span class="arrow">→</span>
                    </div>
                </div>
            </a>

            <a href="aibeat.html" class="app-card">
                <div class="app-icon">AI</div>
                <h2 class="app-title">AI 感情对话</h2>
                <p class="app-desc">
                    与AI进行情感交流，体验温暖贴心的智能对话，理解你的情绪与需求。
                </p>
                <div class="app-tags">
                    <span class="tag">情感识别</span>
                    <span class="tag">自然对话</span>
                    <span class="tag">智能回应</span>
                </div>
                <div class="app-action">
                    开始体验 <span class="arrow">→</span>
                </div>
            </a>

            <a href="mimotts.html" class="app-card">
                <div class="app-icon">TTS</div>
                <h2 class="app-title">V2-TTS 体验</h2>
                <p class="app-desc">
                    体验文本转语音技术，感受自然流畅的语音合成效果。
                </p>
                <div class="app-tags">
                    <span class="tag">多音色</span>
                    <span class="tag">自然韵律</span>
                    <span class="tag">高质量</span>
                </div>
                <div class="app-action">
                    开始体验 <span class="arrow">→</span>
                </div>
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>应用中心</p>
    </footer>
</body>
</html>
